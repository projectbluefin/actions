name: Reusable Renovate Runner

# Centralised Renovate runner for all projectbluefin image repos.
# Each image repo keeps its own schedule/dispatch wrapper but delegates the
# job logic here to avoid duplication and to ensure security defaults
# (persist-credentials: false) are applied consistently.

on:
  workflow_call:
    inputs:
      dry_run:
        description: "Dry run (log only, no PRs created or updated)"
        type: boolean
        default: false
        required: false
    secrets:
      renovate_token:
        required: true

permissions: {}

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Validate RENOVATE_TOKEN
        uses: ./actions/check-token-health
        with:
          token: ${{ secrets.renovate_token }}
          token_name: RENOVATE_TOKEN
          required_scopes: repo,workflow

      - name: Run Renovate
        uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        with:
          token: ${{ secrets.renovate_token }}
        env:
          LOG_LEVEL: ${{ inputs.dry_run == true && 'debug' || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dry_run == true && 'full' || '' }}
