name: Validate Renovate Config
# Thin caller — logic lives in reusable-validate-renovate.yml

on:
  pull_request:
    paths:
      - ".github/renovate.json5"
  push:
    branches:
      - main
    paths:
      - ".github/renovate.json5"

permissions: {}

jobs:
  validate:
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-validate-renovate.yml
