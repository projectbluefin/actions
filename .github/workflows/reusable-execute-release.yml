name: Reusable Execute Release

on:
  workflow_call:
    inputs:
      registry:
        description: GHCR registry prefix
        required: false
        default: ghcr.io/projectbluefin
        type: string
      variants:
        description: JSON array of image promotion objects with image, source_tag, target_tag keys
        required: true
        type: string
      fast_forward_branch:
        description: Branch to fast-forward after promotion (leave empty to skip)
        required: false
        default: ''
        type: string
      cosign_identity_regexp:
        description: Regular expression for cosign certificate identity verification
        required: true
        type: string
      fast_forward_sha:
        description: "The SHA verified and promoted. Used to fast-forward the bookmark branch. Strongly recommended; will become required in v2. If omitted, falls back to github.sha (unsafe under workflow_run triggers)."
        required: false
        type: string
        default: ""
      tag_name:
        description: Release tag for Discord notification (e.g. bluefin-stable-20250624.0). Leave empty to skip notification.
        required: false
        type: string
        default: ''
    outputs:
      promoted_digests:
        description: JSON map of promoted digests keyed by image name
        value: ${{ jobs.execute.outputs.promoted_digests }}
      promoted_sha:
        description: Source SHA promoted by this workflow
        value: ${{ jobs.execute.outputs.promoted_sha }}

permissions: {}

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      issues: write
      packages: write
      pull-requests: write
    outputs:
      promoted_digests: ${{ steps.resolve.outputs.digests }}
      promoted_sha: ${{ steps.resolve-sha.outputs.sha }}
    steps:
      - name: Resolve fast-forward SHA
        id: resolve-sha
        shell: bash
        env:
          INPUT_SHA: ${{ inputs.fast_forward_sha }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${INPUT_SHA}" ]; then
            echo "::warning::fast_forward_sha not provided by caller; falling back to github.sha=${GITHUB_SHA}. This fallback will be removed in v2 — update your caller to pass needs.<job>.outputs.build_sha."
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${INPUT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to GHCR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY: ${{ inputs.registry }}
        run: |
          set -euo pipefail
          registry_host="${REGISTRY#docker://}"
          registry_host="${registry_host%%/*}"
          echo "$GH_TOKEN" | skopeo login "$registry_host" --username "${{ github.actor }}" --password-stdin

      - name: Resolve source digests
        id: resolve
        shell: bash
        env:
          REGISTRY: ${{ inputs.registry }}
          VARIANTS_JSON: ${{ inputs.variants }}
        run: |
          set -euo pipefail
          digests='{}'

          while IFS= read -r variant; do
            [ -n "$variant" ] || continue
            image=$(jq -r '.image' <<<"$variant")
            source_tag=$(jq -r '.source_tag' <<<"$variant")
            ref="${REGISTRY}/${image}:${source_tag}"
            digest=$(skopeo inspect --format '{{.Digest}}' "docker://${ref}")
            digests=$(jq -c --arg image "$image" --arg digest "$digest" '. + {($image): $digest}' <<<"$digests")
            echo "Resolved ${image}:${source_tag} -> ${digest}"
          done < <(jq -c '.[]' <<<"$VARIANTS_JSON")

          echo "digests=${digests}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Re-verify cosign signatures before promotion
        shell: bash
        env:
          DIGESTS_JSON: ${{ steps.resolve.outputs.digests }}
          IDENTITY_REGEXP: ${{ inputs.cosign_identity_regexp }}
          REGISTRY: ${{ inputs.registry }}
          VARIANTS_JSON: ${{ inputs.variants }}
        run: |
          set -euo pipefail
          while IFS= read -r variant; do
            [ -n "$variant" ] || continue
            image=$(jq -r '.image' <<<"$variant")
            digest=$(jq -r --arg image "$image" '.[$image]' <<<"$DIGESTS_JSON")
            ref="${REGISTRY}/${image}@${digest}"
            echo "Verifying ${ref}"
            cosign verify \
              --certificate-identity-regexp "$IDENTITY_REGEXP" \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
              "$ref" >/dev/null
          done < <(jq -c '.[]' <<<"$VARIANTS_JSON")

      - name: Promote digests to target tags
        shell: bash
        env:
          DIGESTS_JSON: ${{ steps.resolve.outputs.digests }}
          REGISTRY: ${{ inputs.registry }}
          VARIANTS_JSON: ${{ inputs.variants }}
        run: |
          set -uo pipefail
          # Transactional promotion: attempt all variants regardless of any single
          # failure, then fail the step at the end if any variant failed. This
          # guarantees:
          #   (a) one stuck variant does not block reconciliation of its siblings
          #   (b) the step still fails so the next workflow_run retries
          #   (c) successful variants are kept — skopeo copy is by-digest and
          #       idempotent, so a replay on a subsequent retry is safe.
          #
          # --preserve-digests is required: cosign signatures live at
          # sha256-<DIGEST>.sig and follow the source digest. Any manifest rewrite
          # by skopeo (format/compression renegotiation) would orphan the
          # signature and leave the target tag pointing at an unsigned digest.
          # --preserve-digests is compatible with --all for multi-arch manifest
          # lists (containers/skopeo docs: skopeo-copy.1.md OPTIONS/--preserve-digests).
          failed_variants=()
          while IFS= read -r variant; do
            [ -n "$variant" ] || continue
            image=$(jq -r '.image' <<<"$variant")
            target_tag=$(jq -r '.target_tag' <<<"$variant")
            digest=$(jq -r --arg image "$image" '.[$image]' <<<"$DIGESTS_JSON")
            src="docker://${REGISTRY}/${image}@${digest}"
            dest="docker://${REGISTRY}/${image}:${target_tag}"
            echo "Promoting ${src} to ${dest}"
            if ! skopeo copy --preserve-digests --all "$src" "$dest"; then
              echo "::warning::Promotion failed for variant ${image} -> :${target_tag}"
              failed_variants+=("${image}:${target_tag}")
            fi
          done < <(jq -c '.[]' <<<"$VARIANTS_JSON")

          if [ ${#failed_variants[@]} -gt 0 ]; then
            echo "::error::Promotion failed for ${#failed_variants[@]} variant(s): ${failed_variants[*]}"
            exit 1
          fi

      - name: Fast-forward branch after promotion
        if: inputs.fast_forward_branch != ''
        shell: bash
        env:
          BRANCH: ${{ inputs.fast_forward_branch }}
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.resolve-sha.outputs.sha }}
        run: |
          set -euo pipefail
          # TARGET_SHA comes from the resolve-sha step which prefers
          # inputs.fast_forward_sha (the caller-supplied verified SHA under
          # the workflow_run-triggered contract) and falls back to github.sha
          # with a deprecation warning. Under the new contract this SHA is
          # already on the default branch (the publishing workflow runs
          # against main's head), so the bookmark branch can fast-forward
          # to it directly.
          #
          # sync-main-to-lts.yml creates merge commits on the branch on every
          # main push, so the branch may already be at or ahead of TARGET_SHA
          # by the time this step runs.
          compare=$(gh api \
            "repos/${{ github.repository }}/compare/${TARGET_SHA}...${BRANCH}" \
            --jq '.status' 2>/dev/null || echo "diverged")

          if [ "$compare" = 'identical' ] || [ "$compare" = 'ahead' ]; then
            echo "${BRANCH} is already at or ahead of ${TARGET_SHA} (status: ${compare}). Skipping fast-forward."
            exit 0
          fi

          gh api "repos/${{ github.repository }}/git/refs/heads/${BRANCH}" \
            --method PATCH \
            --field sha="$TARGET_SHA" \
            --field force=false >/dev/null
          echo "Fast-forwarded ${BRANCH} to ${TARGET_SHA}"

      - name: Update sticky comment with promotion result
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DIGESTS_JSON: ${{ steps.resolve.outputs.digests }}
          PROMOTED_SHA: ${{ steps.resolve-sha.outputs.sha }}
          VARIANTS_JSON: ${{ inputs.variants }}
        with:
          script: |
            const marker = '<!-- release-status-marker -->';
            const gateStart = '<!-- release-gate-start -->';
            const gateEnd = '<!-- release-gate-end -->';
            const reminderStart = '<!-- release-reminder-start -->';
            const reminderEnd = '<!-- release-reminder-end -->';
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.info('No pull_request context (push trigger) — skipping sticky comment update.');
              return;
            }
            const digests = JSON.parse(process.env.DIGESTS_JSON || '{}');
            const variants = JSON.parse(process.env.VARIANTS_JSON || '[]');
            const actor = context.actor;
            const promotedAt = new Date().toISOString();

            const digestLines = variants.map((variant) => {
              const digest = digests[variant.image] || 'unknown';
              const shortDigest = digest.startsWith('sha256:')
                ? `sha256:${digest.slice(7, 23)}`
                : digest.slice(0, 16);
              return `| ${variant.image} | ${variant.source_tag} | ${variant.target_tag} | ${shortDigest} |`;
            }).join('\n');

            const gateSection = [
              gateStart,
              'Release status',
              '',
              'Status: promoted',
              `Promoted on (UTC): ${promotedAt}`,
              `Promoted by: ${actor}`,
              `Source SHA: ${process.env.PROMOTED_SHA}`,
              '',
              'Digests',
              '',
              '| Variant | Source tag | Target tag | Digest |',
              '|---|---|---|---|',
              digestLines || '| none | none | none | none |',
              gateEnd,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            let reminderSection = `${reminderStart}\n${reminderEnd}`;
            if (existing) {
              const reminderMatch = existing.body.match(new RegExp(`${reminderStart}[\\s\\S]*?${reminderEnd}`));
              if (reminderMatch) {
                reminderSection = reminderMatch[0];
              }
            }

            const body = [marker, gateSection, reminderSection].join('\n\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Close legacy failure issues
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const legacyTitles = new Set([
              'ci: weekly LTS release failure',
              'ci: weekly promotion e2e failure',
              'ci: weekly release failure',
            ]);
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            for (const issue of issues) {
              if (issue.pull_request) {
                continue;
              }
              if (!legacyTitles.has(issue.title)) {
                continue;
              }
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }

      - name: Confirm release promotion completed
        shell: bash
        run: |
          set -euo pipefail
          echo 'Release promotion completed. Caller should run the release notes workflow as a separate job.'

      - name: Notify Discord releases channel
        if: success() && inputs.tag_name != ''
        uses: projectbluefin/actions/.github/actions/discord-release-notify@v1
        with:
          webhook_url: ${{ secrets.DISCORD_RELEASES_WEBHOOK }}
          tag_name: ${{ inputs.tag_name }}
          repo: ${{ github.repository }}
          variants_json: ${{ inputs.variants }}
          digests_json: ${{ steps.resolve.outputs.digests }}
