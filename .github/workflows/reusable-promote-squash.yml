# reusable-promote-squash.yml — shared squash-promote logic for bluefin, bluefin-lts
#
# Consolidates promote-testing-to-main.yml across image repos:
#   projectbluefin/bluefin     (~343 LoC) → thin caller (~25 LoC)
#   projectbluefin/bluefin-lts (~354 LoC) → thin caller (~25 LoC)
#
# Implements consistency-audit C1 from projectbluefin/common.
#
# Key improvement over per-repo workflows:
#   - Squash branch is always rebuilt fresh from origin/target_branch — no staleness,
#     no conflict drift, no "parent is stale" failures.
#   - --auto replaces the 12-step mergeability-polling + GraphQL enqueue loop.
#
# Branch model support:
#   - Default (bluefin): source_branch=testing promotes into target_branch=main
#   - bluefin-lts:       source_branch=main   promotes into target_branch=lts

name: reusable-promote-squash

on:
  workflow_call:
    inputs:
      variants:
        description: >
          JSON array of variant objects for release-gate,
          e.g. '[{"image":"bluefin"},{"image":"bluefin-nvidia"}]'
        required: true
        type: string
      cosign_identity_regexp:
        description: >
          Regex for cosign certificate identity,
          e.g. '^https://github\.com/projectbluefin/(bluefin|actions)/\.github/workflows/'
        required: true
        type: string
      registry:
        description: 'GHCR registry prefix'
        required: false
        type: string
        default: 'ghcr.io/projectbluefin'
      run_e2e:
        description: 'Whether the release-gate should require a passing e2e run'
        required: false
        type: boolean
        default: false
      e2e_suites:
        description: 'Comma-separated testsuite suite identifiers (smoke, common, lts, dakota)'
        required: false
        type: string
        default: 'smoke'
      e2e_image:
        description: 'Full image ref for e2e gate; if empty, e2e step is skipped'
        required: false
        type: string
        default: ''
      source_branch:
        description: >
          Branch to promote FROM. Compared against target_branch; if trees
          differ a squash PR is opened. Default: testing (bluefin model).
          Use main for repos with a separate production branch (e.g. bluefin-lts).
        required: false
        type: string
        default: 'testing'
      target_branch:
        description: >
          Branch to promote TO. The squash PR targets this branch.
          Default: main. Use lts for bluefin-lts.
        required: false
        type: string
        default: 'main'
      use_merge_queue:
        description: >
          Set true when the target branch is protected by a GitHub merge queue ruleset.
          Uses enqueuePullRequest GraphQL instead of enablePullRequestAutoMerge.
          enablePullRequestAutoMerge is blocked by merge queue rulesets and silently
          fails. enqueuePullRequest places the PR in the queue and the queue runner
          merges it once all required approvals and checks pass.
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-testing-to-main-${{ github.event.repository.name }}
  cancel-in-progress: false

jobs:
  promote:
    name: Build and maintain squash promotion PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    outputs:
      sync_needed: ${{ steps.compare.outputs.sync_needed }}
      testing_sha: ${{ steps.compare.outputs.testing_sha }}
      source_sha: ${{ steps.source-sha.outputs.sha }}
      pr_number: ${{ steps.upsert.outputs.pr_number }}
      pr_url: ${{ steps.upsert.outputs.pr_url }}
      promoted: ${{ steps.rebuild.outputs.promoted }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Resolve source branch HEAD SHA for e2e gate
        id: source-sha
        env:
          GH_TOKEN: ${{ github.token }}
          # E2E workflows run on builds to source_branch:
          #   bluefin:     source_branch=testing  → post-testing-e2e runs carry testing HEAD SHA
          #   bluefin-lts: source_branch=main     → post-merge-e2e runs carry main HEAD SHA
          # Gate queries Actions API by head_sha — must match the branch where e2e actually ran.
          E2E_HEAD_BRANCH: ${{ inputs.source_branch }}
        run: |
          sha=$(gh api "repos/${{ github.repository }}/git/ref/heads/${E2E_HEAD_BRANCH}" --jq '.object.sha') \
            || { echo "::error::Branch '${E2E_HEAD_BRANCH}' not found — check inputs.source_branch"; exit 1; }
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout actions scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: projectbluefin/actions
          path: .workflow-scripts
          sparse-checkout: |
            scripts/render_pr_body.py
          sparse-checkout-cone-mode: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch branches
        env:
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: git fetch origin "$TARGET_BRANCH" "$SOURCE_BRANCH"

      - name: Compare source and target trees
        id: compare
        env:
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail

          TARGET_SHA=$(git rev-parse "origin/${TARGET_BRANCH}")
          SOURCE_SHA=$(git rev-parse "origin/${SOURCE_BRANCH}")
          TARGET_TREE=$(git rev-parse "origin/${TARGET_BRANCH}^{tree}")
          SOURCE_TREE=$(git rev-parse "origin/${SOURCE_BRANCH}^{tree}")

          if [ "$TARGET_TREE" = "$SOURCE_TREE" ]; then
            echo "::notice::${SOURCE_BRANCH} and ${TARGET_BRANCH} are identical — nothing to promote"
            echo "sync_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "${SOURCE_BRANCH} differs from ${TARGET_BRANCH} — promotion needed"
            echo "sync_needed=true" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "testing_sha=${SOURCE_SHA}"
            echo "target_sha=${TARGET_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Rebuild squash promotion branch
        if: steps.compare.outputs.sync_needed == 'true'
        id: rebuild
        env:
          PROMOTION_BRANCH: auto/promote-testing-to-main
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail
          # Always rebuild from current origin/target_branch — eliminates staleness and conflict
          # drift. Force-push ensures the PR always shows a clean single-commit diff.
          git checkout -B "$PROMOTION_BRANCH" "origin/${TARGET_BRANCH}"
          # Build the squash content by checking out source's full tree.
          # Using 'git checkout <source> -- .' avoids all merge-conflict scenarios
          # (rename/delete, add/add, etc.) while still producing the correct delta:
          # the resulting commit on auto/promote-* has lts as parent but main's tree,
          # so merging it into lts makes lts identical to main.
          git checkout "origin/${SOURCE_BRANCH}" -- .
          git add -A
          # Restore index-only deletions: files deleted in main but present in lts
          # must be staged as deletions so the squash commit removes them from lts.
          git diff --name-only --diff-filter=D "origin/${TARGET_BRANCH}" "origin/${SOURCE_BRANCH}" \
            | xargs -r git rm -f --ignore-unmatch -- 2>/dev/null || true
          git add -A
          # The runner checks out projectbluefin/actions into .workflow-scripts earlier in
          # this job. `git add -A` captures that as an undeclared gitlink (mode 160000) with
          # no .gitmodules entry. Consumer builds that use `submodules: recursive` abort with
          # "No url found for submodule path .workflow-scripts".  Remove it from the index
          # before writing the tree so the squash commit is clean.
          git update-index --force-remove .workflow-scripts 2>/dev/null || true
          # Guard: git merge --squash may report "Already up to date" when source branch
          # content is already subsumed by target (diverged histories, identical effective
          # diff). git commit would exit 1 with nothing staged — catch this early.
          if git diff --cached --quiet; then
            echo "::notice::Squash produced no staged changes — source content already in target. No PR needed."
            git push origin --delete "$PROMOTION_BRANCH" 2>/dev/null || true
            echo "promoted=false" >> "$GITHUB_OUTPUT"
          else
            # Tree-identity check: if the squash content is unchanged from the existing
            # promotion branch, skip the force-push. A force-push changes the head SHA
            # and causes GitHub to dismiss any existing PR approvals — even when the diff
            # is identical and only the parent commit (main HEAD) moved forward.
            # Skipping the push preserves approvals so a second maintainer can merge
            # without the first having to re-approve.
            # promoted=skipped passes all downstream `!= 'false'` guards so the PR body
            # and gate section are still refreshed.
            NEW_TREE=$(git write-tree)
            EXISTING_TREE=$(git rev-parse "origin/${PROMOTION_BRANCH}^{tree}" 2>/dev/null || echo "")
            if [ "$NEW_TREE" = "$EXISTING_TREE" ] && [ -n "$EXISTING_TREE" ]; then
              echo "::notice::Squash tree unchanged — skipping push to preserve PR approvals"
              echo "promoted=skipped" >> "$GITHUB_OUTPUT"
            else
              git commit -m "chore: promote ${SOURCE_BRANCH} to ${TARGET_BRANCH}"
              git push --force origin "$PROMOTION_BRANCH"
              echo "✅ Squash branch rebuilt"
              echo "promoted=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Fetch last stable release metadata
        if: steps.compare.outputs.sync_needed == 'true' && steps.rebuild.outputs.promoted != 'false'
        id: last-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RELEASE_JSON=$(gh release list \
            --repo "${{ github.repository }}" \
            --limit 1 \
            --json tagName,publishedAt \
            --jq '.[0]' 2>/dev/null || echo '{}')

          TAG=$(echo "${RELEASE_JSON}" | jq -r '.tagName // empty')
          PUBLISHED=$(echo "${RELEASE_JSON}" | jq -r '.publishedAt // empty')

          if [[ -n "${TAG}" && -n "${PUBLISHED}" ]]; then
            DAYS=$(( ( $(date +%s) - $(date -d "${PUBLISHED}" +%s) ) / 86400 ))
            {
              echo "days=${DAYS}"
              echo "tag=${TAG}"
              echo "url=https://github.com/${{ github.repository }}/releases/tag/${TAG}"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "days="
              echo "tag="
              echo "url="
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Collect git log for PR body
        if: steps.compare.outputs.sync_needed == 'true' && steps.rebuild.outputs.promoted != 'false'
        id: gitlog
        env:
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail
          COUNT=$(git rev-list --count "origin/${TARGET_BRANCH}..origin/${SOURCE_BRANCH}" 2>/dev/null || echo 0)
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

          # Build commits JSON safely — split on tab, never rely on shell JSON escaping
          COMMITS_JSON=$(git log "origin/${TARGET_BRANCH}..origin/${SOURCE_BRANCH}" \
            --pretty=format:'%H%x09%s' \
            --max-count=20 \
            | python3 -c '
          import sys, json
          rows = []
          for line in sys.stdin:
              sha, _, subject = line.rstrip("\n").partition("\t")
              rows.append({"sha": sha, "subject": subject})
          print(json.dumps(rows))
          ' 2>/dev/null || echo '[]')
          echo "commits_json=${COMMITS_JSON}" >> "$GITHUB_OUTPUT"
          echo "compare_url=https://github.com/${{ github.repository }}/compare/${TARGET_BRANCH}...${SOURCE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Render promotion PR body
        if: steps.compare.outputs.sync_needed == 'true' && steps.rebuild.outputs.promoted != 'false'
        id: render
        env:
          PR_BODY_FILE: ${{ runner.temp }}/promotion-pr-body.md
          VARIANTS:     ${{ inputs.variants }}
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_COUNT: ${{ steps.gitlog.outputs.count }}
          COMMITS_JSON: ${{ steps.gitlog.outputs.commits_json }}
          COMPARE_URL:  ${{ steps.gitlog.outputs.compare_url }}
          DAYS_AGO:     ${{ steps.last-release.outputs.days }}
          LAST_TAG:     ${{ steps.last-release.outputs.tag }}
          LAST_URL:     ${{ steps.last-release.outputs.url }}
        run: |
          set -euo pipefail
          PRIMARY_IMAGE=$(echo "${VARIANTS}" | jq -r 'if .[0] | type == "string" then .[0] else .[0].image end')
          # Title-case slug for display name: bluefin-lts → Bluefin Lts
          PROJECT_NAME=$(echo "${PRIMARY_IMAGE}" | tr '-' ' ' | python3 -c "import sys; print(sys.stdin.read().title().strip())")
          DATE="$(date -u +%Y-%m-%d)"

          DAYS_ARGS=()
          [[ -n "${DAYS_AGO}" ]] && DAYS_ARGS+=(--days-since-stable "${DAYS_AGO}")
          TAG_ARGS=()
          [[ -n "${LAST_TAG}" ]] && TAG_ARGS+=(--last-release-tag "${LAST_TAG}" --last-release-url "${LAST_URL}")

          python3 .workflow-scripts/scripts/render_pr_body.py \
            --project-name  "${PROJECT_NAME}" \
            --primary-image "${PRIMARY_IMAGE}" \
            --variants-json "${VARIANTS}" \
            --repo          "${{ github.repository }}" \
            --run-url       "${RUN_URL}" \
            --date          "${DATE}" \
            "${DAYS_ARGS[@]}" \
            "${TAG_ARGS[@]}" \
            --commit-count  "${COMMIT_COUNT}" \
            --commits-json  "${COMMITS_JSON}" \
            --compare-url   "${COMPARE_URL}" \
            --output        "${PR_BODY_FILE}"

          # Slug from e2e_image (full ref tested): strip ghcr.io/<org>/, replace : with -
          # e.g. ghcr.io/projectbluefin/bluefin:testing → bluefin-testing
          E2E_IMAGE="${{ inputs.e2e_image }}"
          if [[ -n "$E2E_IMAGE" ]]; then
            SCREENSHOT_SLUG=$(echo "$E2E_IMAGE" | sed 's|ghcr.io/[^/]*/||' | tr ':' '-')
          else
            SCREENSHOT_SLUG=$(printf '%s' "${PRIMARY_IMAGE}" | tr ':' '-')
          fi
          SCREENSHOT_URL="https://projectbluefin.github.io/testsuite/screenshots/${SCREENSHOT_SLUG}-smoke-latest.png"
          cat >> "${PR_BODY_FILE}" <<EOF

          ## Desktop Screenshot

          > [!CAUTION]
          > **Auto-merge scheduled for Tuesday 04:00 UTC (bluefin/dakota) / Thursday 04:00 UTC (bluefin-lts).**
          > To block this release: add the \`do-not-merge\` label to this PR before that time.
          > Remove the label when the issue is resolved -- the next weekly window will pick it up automatically.

          ![${PRIMARY_IMAGE} desktop](${SCREENSHOT_URL})
          EOF

          echo "pr_title=ci(promote): ${PRIMARY_IMAGE} ${SOURCE_BRANCH} → ${TARGET_BRANCH} ${DATE}" >> "$GITHUB_OUTPUT"

      - name: Upsert promotion PR
        if: steps.compare.outputs.sync_needed == 'true' && steps.rebuild.outputs.promoted != 'false'
        id: upsert
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY_FILE: ${{ runner.temp }}/promotion-pr-body.md
          PROMOTION_BRANCH: auto/promote-testing-to-main
          PR_TITLE: ${{ steps.render.outputs.pr_title }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail

          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base "$TARGET_BRANCH" \
            --head "$PROMOTION_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --title "${PR_TITLE}" \
              --body-file "${PR_BODY_FILE}"
            echo "Updated existing PR #${PR_NUMBER}"
          else
            PR_URL=$(gh pr create \
              --repo "${{ github.repository }}" \
              --base "$TARGET_BRANCH" \
              --head "$PROMOTION_BRANCH" \
              --title "${PR_TITLE}" \
              --body-file "${PR_BODY_FILE}" \
              --reviewer "${{ github.repository_owner }}/maintainers")
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Created PR #${PR_NUMBER}"
          fi

          # Re-request the maintainers team after a force-push (promoted=true).
          # A force-push dismisses existing reviews and clears reviewer requests,
          # leaving nobody assigned for the second review. Skip on promoted=skipped
          # (tree unchanged, existing approvals preserved — no re-request needed).
          if [ "${{ steps.rebuild.outputs.promoted }}" = "true" ]; then
            gh pr edit "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --add-reviewer "${{ github.repository_owner }}/maintainers" 2>/dev/null \
              && echo "✅ Re-requested maintainers review" \
              || echo "⚠️  Could not re-request reviewers (team may not exist or no permission)"
          fi

          PR_URL=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json url --jq '.url')
          {
            echo "pr_number=${PR_NUMBER}"
            echo "pr_url=${PR_URL}"
          } >> "$GITHUB_OUTPUT"

      - name: Check do-not-merge label
        if: steps.upsert.outputs.pr_number != ''
        id: check-dnm
        run: |
          LABELS=$(gh pr view "${{ steps.upsert.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "do-not-merge"; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge or enqueue promotion PR
        if: steps.upsert.outputs.pr_number != '' && steps.check-dnm.outputs.blocked == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.upsert.outputs.pr_number }}
        run: |
          set -euo pipefail
          # Enable auto-merge or enqueue in the merge queue.
          # For repos with a merge queue ruleset on the target branch, --auto calls
          # enablePullRequestAutoMerge which is blocked — use enqueuePullRequest instead.
          # The PR will sit in the queue and merge automatically once required approvals
          # and status checks pass.
          if [ "${{ inputs.use_merge_queue }}" = "true" ]; then
            NODE_ID=$(gh pr view "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --json id --jq '.id')
            # shellcheck disable=SC2016  # $id is a GraphQL variable, not a shell variable
            gh api graphql \
              -f query='mutation($id:ID!){enqueuePullRequest(input:{pullRequestId:$id}){mergeQueueEntry{id}}}' \
              -f id="$NODE_ID" 2>/dev/null \
              && echo "✅ PR #${PR_NUMBER} enqueued in merge queue" \
              || echo "⚠️  Could not enqueue PR #${PR_NUMBER} (may already be queued, or approvals not yet met)"
          else
            gh pr merge "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --auto 2>/dev/null \
              && echo "✅ Auto-merge enabled on PR #${PR_NUMBER}" \
              || echo "⚠️  Auto-merge not available — maintainer merges when checks pass"
          fi

      - name: Report do-not-merge label block
        if: steps.upsert.outputs.pr_number != '' && steps.check-dnm.outputs.blocked == 'true'
        env:
          PR_NUMBER: ${{ steps.upsert.outputs.pr_number }}
        run: |
          echo "::notice::PR #${PR_NUMBER} has the do-not-merge label; auto-merge/queue enrollment skipped."

  gate:
    name: Release gate checks
    needs: [promote]
    if: needs.promote.outputs.sync_needed == 'true' && needs.promote.outputs.promoted != 'false'
    permissions:
      actions: read
      contents: read
      issues: write
      packages: read
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-gate.yml@7827453a52eaddb45cb432bd14d9651bc27669ba # v1
    with:
      repo: ${{ github.repository }}
      pr_number: ${{ needs.promote.outputs.pr_number }}
      head_sha: ${{ needs.promote.outputs.source_sha }}
      registry: ${{ inputs.registry }}
      variants: ${{ inputs.variants }}
      cosign_identity_regexp: ${{ inputs.cosign_identity_regexp }}
      target_tag: testing
      run_e2e: ${{ inputs.run_e2e }}
      e2e_suites: ${{ inputs.e2e_suites }}
      e2e_image: ${{ inputs.e2e_image }}
    secrets: inherit

  close-failure-issue:
    needs: [promote]
    if: needs.promote.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Close stale failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = 'ci: testing→main promotion conflict';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'area/ci,kind/bug',
              state: 'open',
            });
            const open = existing.data.find(i => i.title === title);
            if (open) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.info(`Closed stale failure issue #${open.number}`);
            }

  report-failure:
    needs: [promote]
    if: always() && needs.promote.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const testingSha = '${{ needs.promote.outputs.testing_sha }}' || 'unknown';
            const prUrl = '${{ needs.promote.outputs.pr_url }}';
            const title = 'ci: testing→main promotion conflict';
            const body = `## Promotion Conflict\n\n**Run:** ${runUrl}\n**Source SHA:** \`${testingSha}\`${prUrl ? `\n**PR:** ${prUrl}` : ''}\n\n_Automatically opened by promote-testing-to-main.yml_`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'area/ci,kind/bug',
              state: 'open',
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['area/ci', 'kind/bug', 'priority/p1'],
              });
            }
