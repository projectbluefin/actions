# Merges source_branch into target_branch after a squash-merge promotion.
# Prevents the recurring "BEHIND" state caused by squash merges creating a
# divergence between the source branch and its squash commit on the target.
# Called by each consumer repo's sync-main-to-testing.yml on push to main.
#
# Divergence handling: if target has commits source does not (e.g. Renovate
# PRs landed on testing while main got CI fixes), the target is force-reset
# to source instead of attempting a merge. The force-reset is safe because:
#   - Automated commits on testing (Renovate digests) are recreated by Renovate
#   - Human commits should not land on testing directly (enforced by pr-triage)
#   - A failed merge leaves the pipeline broken indefinitely; force-reset
#     recovers in seconds and is logged clearly.
name: Reusable Sync Branches

on:
  workflow_call:
    inputs:
      source_branch:
        description: "Branch to merge from (e.g. main)"
        default: main
        type: string
      target_branch:
        description: "Branch to merge into (e.g. testing)"
        default: testing
        type: string
    secrets:
      BLUEFINBOT_APP_ID:
        description: "GitHub App client ID for bypassing protected-branch push rules"
        required: false
      BLUEFINBOT_PRIVATE_KEY:
        description: "GitHub App private key"
        required: false

jobs:
  sync:
    name: Merge ${{ inputs.source_branch }} → ${{ inputs.target_branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.BLUEFINBOT_APP_ID }}
          private-key: ${{ secrets.BLUEFINBOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if sync is needed
        id: check
        run: |
          set -euo pipefail
          git fetch origin "${{ inputs.source_branch }}" "${{ inputs.target_branch }}"
          SOURCE_TREE=$(git rev-parse "origin/${{ inputs.source_branch }}^{tree}")
          TARGET_TREE=$(git rev-parse "origin/${{ inputs.target_branch }}^{tree}")
          if [ "$SOURCE_TREE" = "$TARGET_TREE" ]; then
            echo "sync_needed=false" >> "$GITHUB_OUTPUT"
            echo "Branches have identical trees — no sync needed"
          else
            echo "sync_needed=true" >> "$GITHUB_OUTPUT"
            echo "Trees differ — syncing ${{ inputs.source_branch }} into ${{ inputs.target_branch }}"
          fi

      - name: Detect divergence
        id: diverge
        if: steps.check.outputs.sync_needed == 'true'
        run: |
          set -euo pipefail
          AHEAD=$(git rev-list --count \
            "origin/${{ inputs.source_branch }}..origin/${{ inputs.target_branch }}")
          echo "ahead=${AHEAD}" >> "$GITHUB_OUTPUT"
          if [ "$AHEAD" -gt 0 ]; then
            echo "strategy=force-reset" >> "$GITHUB_OUTPUT"
            echo "⚠️  ${{ inputs.target_branch }} is ${AHEAD} commit(s) ahead of ${{ inputs.source_branch }} — diverged, will force-reset"
          else
            echo "strategy=merge" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.target_branch }} is simply behind ${{ inputs.source_branch }} — will fast-forward merge"
          fi

      - name: Merge source into target (fast-forward)
        if: >-
          steps.check.outputs.sync_needed == 'true' &&
          steps.diverge.outputs.strategy == 'merge'
        run: |
          set -euo pipefail
          git checkout "${{ inputs.target_branch }}"
          # --ff-only: refuse to create a merge commit. If git cannot fast-forward
          # (e.g. runner-level merge.ff=false, submodule oddity), fail loudly.
          git merge --ff-only "origin/${{ inputs.source_branch }}" \
            --no-edit
          git push origin "${{ inputs.target_branch }}"
          echo "✅ Merged ${{ inputs.source_branch }} → ${{ inputs.target_branch }}"

      - name: Force-reset target to source (diverged)
        if: >-
          steps.check.outputs.sync_needed == 'true' &&
          steps.diverge.outputs.strategy == 'force-reset'
        run: |
          set -euo pipefail
          AHEAD="${{ steps.diverge.outputs.ahead }}"
          # Capture the exact SHA we fetched for --force-with-lease. If a concurrent
          # push landed on the target between the Detect step and this push, --force-with-lease
          # will reject the push and the workflow will fail rather than silently drop new commits.
          TARGET_SHA=$(git rev-parse "origin/${{ inputs.target_branch }}")
          echo "::warning::Force-resetting ${{ inputs.target_branch }} to origin/${{ inputs.source_branch }} — dropping ${AHEAD} diverged commit(s). Verify no human work was on this branch."
          echo "Expected: automated (Renovate digests, prior sync commits)"
          git checkout "${{ inputs.target_branch }}"
          git reset --hard "origin/${{ inputs.source_branch }}"
          git push origin "${{ inputs.target_branch }}" --force-with-lease="${{ inputs.target_branch }}:${TARGET_SHA}"
          echo "✅ Force-reset ${{ inputs.target_branch }} → ${{ inputs.source_branch }} (dropped ${AHEAD} diverged commits)"
