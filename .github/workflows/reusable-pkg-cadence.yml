name: Reusable — Update package cadence intervals

# Tracks RPM version churn across stable builds and updates pkg-intervals.tsv
# in a consumer repo. chunkah reads user.update-interval xattrs (applied from
# this file by bootc-build/apply-pkg-intervals at build time) to group packages
# into OCI layers by update cadence — weekly packages land in their own layers
# so a typical update only pulls the layers that actually changed.
#
# Consumer adoption — add to your repo:
#
#   .github/workflows/pkg-cadence.yml:
#     on:
#       schedule:
#         - cron: '0 6 * * 0'   # Sunday after stable builds ship
#       workflow_dispatch:
#         inputs:
#           force_reclassify:
#             type: boolean
#             default: false
#     jobs:
#       cadence:
#         uses: projectbluefin/actions/.github/workflows/reusable-pkg-cadence.yml@v1
#         with:
#           image: ghcr.io/yourorg/yourimage:stable
#           repo: yourorg/yourimage
#         secrets:
#           app_id: ${{ secrets.YOUR_APP_ID }}
#           private_key: ${{ secrets.YOUR_APP_PRIVATE_KEY }}
#
# First run: if files/pkg-intervals.tsv doesn't exist yet, the workflow creates
# it from bootstrap heuristics and opens a PR. Merge that PR. Subsequent runs
# replace heuristics with observed churn data after 4+ weeks of history.
#
# Files maintained in the consumer repo:
#   files/pkg-versions.json  — last-seen version per package (snapshot)
#   files/pkg-churn.json     — rolling change counts (90-day window, the memory)
#   files/pkg-intervals.tsv  — derived intervals, consumed at build time
#
# The bootc-build/apply-pkg-intervals action in reusable-build.yml reads
# files/pkg-intervals.tsv automatically — no Containerfile changes needed.
# It silently skips if the file doesn't exist, so builds work before first run.

on:
  workflow_call:
    inputs:
      image:
        description: "Stable image ref to measure churn from (e.g. ghcr.io/yourorg/yourimage:stable)"
        required: true
        type: string
      repo:
        description: "Consumer repo to update (e.g. yourorg/yourimage)"
        required: true
        type: string
      intervals_file:
        description: "Path in the consumer repo to the intervals TSV"
        default: "files/pkg-intervals.tsv"
        required: false
        type: string
      force_reclassify:
        description: "Recompute all intervals from churn data, ignoring bootstrap heuristics"
        default: false
        required: false
        type: boolean
    secrets:
      app_id:
        description: "GitHub App ID"
        required: true
      private_key:
        description: "GitHub App private key"
        required: true

permissions: {}

jobs:
  update-cadence:
    name: ${{ inputs.repo }}
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Generate mergeraptor token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.private_key }}
          owner: ${{ github.repository_owner }}

      - name: Checkout consumer repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ${{ inputs.repo }}
          token: ${{ steps.app-token.outputs.token }}
          path: consumer

      - name: Query installed RPMs from stable image
        run: |
          podman pull "${{ inputs.image }}"
          podman run --rm "${{ inputs.image }}" \
            rpm -qa --queryformat '%{NAME}\t%{VERSION}-%{RELEASE}\n' \
            | sort > /tmp/current-pkgs.tsv
          echo "Packages found: $(wc -l < /tmp/current-pkgs.tsv)"

      - name: Update churn counts and derive intervals
        env:
          INTERVALS_FILE: ${{ inputs.intervals_file }}
          FORCE_RECLASSIFY: ${{ inputs.force_reclassify }}
        run: |
          python3 - <<'EOF'
          import json, re, os
          from datetime import datetime, timedelta
          from pathlib import Path

          CONSUMER       = Path("consumer")
          INTERVALS_PATH = Path(os.environ["INTERVALS_FILE"])
          VERSIONS_FILE  = CONSUMER / "files/pkg-versions.json"
          CHURN_FILE     = CONSUMER / "files/pkg-churn.json"
          INTERVALS_FILE = CONSUMER / INTERVALS_PATH
          CURRENT_FILE   = Path("/tmp/current-pkgs.tsv")
          WINDOW_DAYS    = 90
          TODAY          = datetime.utcnow().strftime('%Y-%m-%d')
          FORCE          = os.environ.get('FORCE_RECLASSIFY', 'false').lower() == 'true'

          current = {}
          for line in CURRENT_FILE.read_text().splitlines():
              if '\t' not in line: continue
              name, ver = line.split('\t', 1)
              current[name] = ver

          prev_versions = json.loads(VERSIONS_FILE.read_text()) if VERSIONS_FILE.exists() else {}
          churn = json.loads(CHURN_FILE.read_text()) if CHURN_FILE.exists() else {}

          changed_pkgs = [
              name for name, ver in current.items()
              if (prev_versions.get(name) or {}).get('version', '') not in ('', ver)
          ]
          print(f"Changed since last snapshot: {len(changed_pkgs)} packages")

          cutoff = (datetime.utcnow() - timedelta(days=WINDOW_DAYS)).strftime('%Y-%m-%d')
          for name in list(churn.keys()):
              if name not in current:
                  del churn[name]; continue
              if churn[name].get('window_start', TODAY) < cutoff:
                  churn[name]['changes'] = 0
                  churn[name]['window_start'] = TODAY

          for name in changed_pkgs:
              churn.setdefault(name, {'changes': 0, 'window_start': TODAY, 'interval': 'monthly'})
              churn[name]['changes'] = churn[name].get('changes', 0) + 1

          for name in current:
              churn.setdefault(name, {'changes': 0, 'window_start': TODAY, 'interval': 'monthly'})

          # Bootstrap heuristics (used until 4+ weeks of data exist)
          WEEKLY_PAT    = re.compile(r'^(tailscale|bootc|distrobox|fastfetch|starship|uupd|ublue-update|topgrade)$')
          QUARTERLY_PAT = re.compile(r'^(alsa-firmware|alsa-tools-firmware|linux-firmware.*|iwl.*firmware.*|atheros-firmware|brcmfmac-firmware|mt7xxx-firmware|nxpwireless-firmware|tiwilink-firmware|cirrus-audio-firmware|intel-audio-firmware)$')
          YEARLY_PAT    = re.compile(r'.*-fonts.*|.*fonts-.*|^google-noto-.*|^liberation-.*|^abattis-cantarell.*|^gnu-free-fonts.*|^dejavu-.*|^urw-base35-.*|^jetbrains-mono-fonts.*|^cascadia-code-fonts.*')

          def bootstrap_interval(name):
              if WEEKLY_PAT.match(name):    return 'weekly'
              if YEARLY_PAT.match(name):    return 'yearly'
              if QUARTERLY_PAT.match(name): return 'quarterly'
              return 'monthly'

          def derive_interval(changes):
              # Calibrated for weekly stable builds, 90-day window (~13 builds)
              if changes >= 8: return 'weekly'
              if changes >= 2: return 'monthly'
              if changes == 1: return 'quarterly'
              return 'yearly'

          interval_changes = 0
          for name, entry in churn.items():
              changes = entry.get('changes', 0)
              window_start = entry.get('window_start', TODAY)
              weeks_of_data = (datetime.utcnow() - datetime.strptime(window_start, '%Y-%m-%d')).days // 7
              if weeks_of_data >= 4 or FORCE:
                  new_interval = derive_interval(changes)
              else:
                  new_interval = entry.get('interval') or bootstrap_interval(name)
              if new_interval != entry.get('interval'):
                  print(f"  {name}: {entry.get('interval')} → {new_interval} ({changes} changes in {weeks_of_data}w)")
                  interval_changes += 1
              entry['interval'] = new_interval

          print(f"Interval reclassifications: {interval_changes}")

          new_versions = {n: {"version": v, "last_seen": TODAY} for n, v in sorted(current.items())}
          INTERVALS_FILE.parent.mkdir(parents=True, exist_ok=True)
          VERSIONS_FILE.parent.mkdir(parents=True, exist_ok=True)
          VERSIONS_FILE.write_text(json.dumps(new_versions, indent=2) + '\n')
          CHURN_FILE.write_text(json.dumps(dict(sorted(churn.items())), indent=2) + '\n')

          lines = ['# name\tinterval\t# maintained by reusable-pkg-cadence workflow — do not edit by hand']
          for name in sorted(current):
              lines.append(f'{name}\t{churn.get(name, {}).get("interval", "monthly")}')
          INTERVALS_FILE.write_text('\n'.join(lines) + '\n')
          print(f"Written {len(current)} entries to {INTERVALS_FILE}")
          EOF

      - name: Check for interval changes
        id: changes
        run: |
          cd consumer
          # pkg-churn.json changes every run; only open a PR when
          # pkg-intervals.tsv changes — that's what the build actually reads.
          if git diff --quiet "${{ inputs.intervals_file }}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No interval changes for ${{ inputs.repo }}"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat "${{ inputs.intervals_file }}"
          fi

      - name: Commit updated cadence files
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd consumer
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/pkg-versions.json files/pkg-churn.json "${{ inputs.intervals_file }}"
          git commit -m "chore(cadence): update pkg interval classifications"
          git push origin HEAD:main
