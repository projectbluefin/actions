name: Reusable Release
# Reusable workflow for GitHub release creation.
# Supports two modes:
#   1. Image release orchestration (find build run, download SBOM, create release)
#   2. Conventional Commits release notes from a supplied tag

on:
  workflow_call:
    inputs:
      stream_name:
        description: "Stream tag to release (for image-release mode, e.g. stable)"
        default: ""
        required: false
        type: string
      build_workflow:
        description: "Workflow filename to search for the latest successful build run"
        default: ""
        required: false
        type: string
      build_branch:
        description: "Branch to search for the latest successful build run"
        default: ""
        required: false
        type: string
      sbom_artifact:
        description: "SBOM artifact name to download from the build run"
        default: sbom-bluefin
        required: false
        type: string
      image:
        description: "Full GHCR image URL without tag (e.g. ghcr.io/projectbluefin/bluefin)"
        default: ""
        required: false
        type: string
      project_name:
        description: "Project display name shown in the release"
        default: ""
        required: false
        type: string
      accent_color:
        description: "Release card accent color"
        default: "#0ea5e9"
        required: false
        type: string
      badge_label:
        description: "Release card badge label"
        default: Stable
        required: false
        type: string
      notable_packages:
        description: "JSON array of notable packages for the release card"
        default: "[]"
        required: false
        type: string
      docs_url:
        description: "URL for changelog documentation"
        default: https://docs.projectbluefin.io/changelogs
        required: false
        type: string
      cert_identity_regexp:
        description: "cosign certificate identity regexp used in release instructions"
        default: ""
        required: false
        type: string
      tag:
        description: "Legacy semver release tag to create (e.g. v1.2.3)"
        default: ""
        required: false
        type: string
      draft:
        description: "Create the legacy semver release as a draft"
        default: false
        required: false
        type: boolean
      prerelease:
        description: "Mark the legacy semver release as a pre-release"
        default: false
        required: false
        type: boolean
      cliff-config:
        description: "Path to cliff.toml config for legacy semver releases"
        default: cliff.toml
        required: false
        type: string
    secrets:
      github_token:
        required: true

permissions: {}

jobs:
  validate:
    name: Validate release mode
    runs-on: ubuntu-24.04
    outputs:
      mode: ${{ steps.validate.outputs.mode }}
    steps:
      - name: Determine workflow mode
        id: validate
        shell: bash
        env:
          STREAM_NAME: ${{ inputs.stream_name }}
          BUILD_WORKFLOW: ${{ inputs.build_workflow }}
          BUILD_BRANCH: ${{ inputs.build_branch }}
          IMAGE: ${{ inputs.image }}
          PROJECT_NAME: ${{ inputs.project_name }}
          CERT_IDENTITY_REGEXP: ${{ inputs.cert_identity_regexp }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          image_mode=0
          semver_mode=0

          if [[ -n "${STREAM_NAME}" || -n "${BUILD_WORKFLOW}" || -n "${BUILD_BRANCH}" || -n "${IMAGE}" || -n "${PROJECT_NAME}" || -n "${CERT_IDENTITY_REGEXP}" ]]; then
            image_mode=1
          fi

          if [[ -n "${TAG}" ]]; then
            semver_mode=1
          fi

          if [[ "${image_mode}" -eq 1 && "${semver_mode}" -eq 1 ]]; then
            echo "::error::Provide either image-release inputs or legacy semver tag inputs, not both"
            exit 1
          fi

          if [[ "${image_mode}" -eq 0 && "${semver_mode}" -eq 0 ]]; then
            echo "::error::No release mode selected"
            exit 1
          fi

          if [[ "${image_mode}" -eq 1 ]]; then
            for required_var in STREAM_NAME BUILD_WORKFLOW BUILD_BRANCH IMAGE PROJECT_NAME CERT_IDENTITY_REGEXP; do
              if [[ -z "${!required_var}" ]]; then
                echo "::error::Missing required image-release input: ${required_var,,}"
                exit 1
              fi
            done
            echo "mode=image" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=semver" >> "$GITHUB_OUTPUT"

  image-release:
    name: Create ${{ inputs.stream_name }} image release
    needs: [validate]
    if: needs.validate.outputs.mode == 'image'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      actions: read
    environment:
      name: production
      url: ${{ inputs.image }}:${{ inputs.stream_name }}
    steps:
      - name: Find latest successful build run
        id: build_run
        env:
          GH_TOKEN: ${{ secrets.github_token }}
          BUILD_WORKFLOW: ${{ inputs.build_workflow }}
          BUILD_BRANCH: ${{ inputs.build_branch }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          RUN=$(gh run list \
            --workflow "${BUILD_WORKFLOW}" \
            --branch "${BUILD_BRANCH}" \
            --status success \
            --limit 1 \
            --json headSha,databaseId \
            --repo "${REPOSITORY}" \
            --jq '.[0]')

          if [[ -z "${RUN}" || "${RUN}" == "null" ]]; then
            echo "::error::Could not find a successful ${BUILD_WORKFLOW} run on ${BUILD_BRANCH}"
            exit 1
          fi

          SHA=$(echo "${RUN}" | jq -r '.headSha')
          RUN_ID=$(echo "${RUN}" | jq -r '.databaseId')

          if [[ -z "${RUN_ID}" || "${RUN_ID}" == "null" ]]; then
            echo "::error::Latest successful build run did not include a run id"
            exit 1
          fi

          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Resolve release metadata
        id: meta
        env:
          STREAM_NAME: ${{ inputs.stream_name }}
          BADGE_LABEL: ${{ inputs.badge_label }}
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y%m%d)"
          TAG="${STREAM_NAME}-${DATE}"
          TITLE="${TAG}: ${BADGE_LABEL}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Resolve image basename
        id: image_name
        env:
          IMAGE: ${{ inputs.image }}
        run: |
          set -euo pipefail
          IMAGE_NAME="$(basename "${IMAGE}")"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Get image digest
        id: digest
        env:
          IMAGE: ${{ inputs.image }}
          STREAM_NAME: ${{ inputs.stream_name }}
        run: |
          set -euo pipefail
          DIGEST=$(skopeo inspect --format '{{.Digest}}' \
            "docker://${IMAGE}:${STREAM_NAME}" 2>/dev/null || echo "")
          if [[ -z "${DIGEST}" ]]; then
            echo "::warning::Could not fetch digest for ${IMAGE}:${STREAM_NAME} — using placeholder"
            DIGEST="sha256:unknown"
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.sbom_artifact }}
          run-id: ${{ steps.build_run.outputs.run_id }}
          github-token: ${{ secrets.github_token }}
          path: sbom-current

      - name: Create release
        uses: projectbluefin/actions/bootc-build/create-release@v1
        with:
          sbom-path: sbom-current/${{ steps.image_name.outputs.image_name }}.sbom.json
          tag: ${{ steps.meta.outputs.tag }}
          title: ${{ steps.meta.outputs.title }}
          image: ${{ inputs.image }}
          digest: ${{ steps.digest.outputs.digest }}
          repo: ${{ github.repository }}
          project-name: ${{ inputs.project_name }}
          accent-color: ${{ inputs.accent_color }}
          badge-label: ${{ inputs.badge_label }}
          sbom-filename: ${{ steps.image_name.outputs.image_name }}.spdx.json
          cert-identity-regexp: ${{ inputs.cert_identity_regexp }}
          notable-packages: ${{ inputs.notable_packages }}
          docs-url: ${{ inputs.docs_url }}
          github-token: ${{ secrets.github_token }}

  semver-release:
    name: Create release ${{ inputs.tag }}
    needs: [validate]
    if: needs.validate.outputs.mode == 'semver'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release-notes
        uses: projectbluefin/actions/bootc-build/generate-release-notes@dc35eb231998ba93244072ec72781e36f373a4a3
        with:
          tag: ${{ inputs.tag }}
          output-file: CHANGELOG.md
          config: ${{ inputs.cliff-config }}
          github-token: ${{ secrets.github_token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body: ${{ steps.release-notes.outputs.content }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
