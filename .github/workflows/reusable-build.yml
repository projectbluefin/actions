name: Reusable Build and Push
# Reusable workflow for Fedora-based bootc image builds (bluefin, aurora, etc.).
# Called by consuming repos with:
#   uses: projectbluefin/actions/.github/workflows/reusable-build.yml@<pinned-ref>
#
# Context note: when called from a consuming repo, github.repository = the caller,
# and actions/checkout checks out the CALLER's code. Local action refs
# Uses full SHA refs for composite actions so cross-repo callers resolve correctly. Just commands run
# against the caller's Justfile in GITHUB_WORKSPACE.

on:
  workflow_call:
    outputs:
      digests:
        description: "JSON map of image_name to platform-digest map, e.g. {\"bluefin-main\": {\"amd64\": \"sha256:...\"}}"
        value: ${{ jobs.collect-digests.outputs.digests }}
    inputs:
      image_flavors:
        description: "JSON array of flavors to build"
        default: '["main", "nvidia"]'
        type: string
      brand_name:
        description: "The Brand Name: bluefin"
        default: bluefin
        type: string
      stream_name:
        description: "The Fedora Version: stable, latest, or beta"
        required: true
        type: string
      kernel_pin:
        description: "The full kernel version to pin"
        type: string
      architecture:
        description: "JSON string of architectures to build, '[\"aarch64\", \"x86_64\"]'"
        default: '["x86_64"]'
        required: false
        type: string
      pr_number:
        description: "PR number when dispatched from e2e-dispatch — enforces PR-scoped tags"
        default: ""
        required: false
        type: string
      scan-severity-threshold:
        description: "Trivy CVE severity threshold for scan-image reporting. Default: CRITICAL."
        default: "CRITICAL"
        required: false
        type: string
      publish_stream_tag:
        description: "Push the stream tag (:testing/:stable) at build time. Set false to gate :testing behind a post-build e2e step."
        default: "true"
        required: false
        type: string
      max_layers:
        description: "Maximum number of OCI layers for chunkah rechunking. Upstream default is 64; bootc images typically use 128."
        default: "128"
        required: false
        type: string

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.brand_name }}-${{ inputs.stream_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install just
        uses: taiki-e/install-action@ab08a3b50948bd57d91bd2980f025da7e0a88231 # just
        with:
          tool: just

      - name: Check Just syntax
        run: just check

  build_container:
    name: image
    needs: [preflight]
    runs-on: ${{ matrix.architecture == 'x86_64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    timeout-minutes: 120
    env:
      DIGEST_FILE: ${{ github.workspace }}/.push-digest
    permissions:
      contents: read
      issues: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        image_flavor: ${{ fromJson(inputs.image_flavors) }}
        base_name: ["${{ inputs.brand_name }}"]
        stream_name: ["${{ inputs.stream_name }}"]
        architecture: ${{ fromJson(inputs.architecture) }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Setup runner
        uses: projectbluefin/actions/bootc-build/setup-runner@v1
        with:
          storage-backend: btrfs
          update-podman: "true"
          install-tools: '["just"]'

      - name: Image Name
        shell: bash
        env:
          MATRIX_BASE_NAME: ${{ matrix.base_name }}
          MATRIX_STREAM_NAME: ${{ matrix.stream_name }}
          MATRIX_IMAGE_FLAVOR: ${{ matrix.image_flavor }}
        run: |
          IMAGE_NAME="$(just image_name "${MATRIX_BASE_NAME}" "${MATRIX_STREAM_NAME}" "${MATRIX_IMAGE_FLAVOR}")"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Default Tag
        shell: bash
        env:
          MATRIX_STREAM_NAME: ${{ matrix.stream_name }}
        run: |
          DEFAULT_TAG="$(just generate-default-tag \
                       "${MATRIX_STREAM_NAME}" \
                       "1")"
          echo "Default Tag: ${DEFAULT_TAG}"
          echo "DEFAULT_TAG=${DEFAULT_TAG}" >> "$GITHUB_ENV"

      - name: DNF Package Cache Setup
        shell: bash
        id: setup-cache
        env:
          MATRIX_BASE_NAME: ${{ matrix.base_name }}
          MATRIX_STREAM_NAME: ${{ matrix.stream_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          CACHE="$(just setup-cache "${MATRIX_BASE_NAME}" \
                            "${MATRIX_STREAM_NAME}" \
                            "1" \
                            "${GITHUB_EVENT_NAME}")"

          CACHE_NAME="$(echo "${CACHE}" | cut -d' ' -f 1)"
          ALLOW_CACHE_WRITE="$(echo "${CACHE}" | cut -d' ' -f 2)"

          echo "cache_name=${CACHE_NAME}" >> "$GITHUB_OUTPUT"
          echo "allow_cache_write=${ALLOW_CACHE_WRITE}" >> "$GITHUB_OUTPUT"

      - name: Restore DNF package cache
        id: dnf-cache-restore
        uses: projectbluefin/actions/bootc-build/dnf-cache@v1
        with:
          action: restore
          cache-name: ${{ steps.setup-cache.outputs.cache_name }}
          architecture: ${{ matrix.architecture }}
          image-flavor: ${{ matrix.image_flavor }}
          cache-bust: ${{ hashFiles('**/Containerfile') }}

      - name: Record build start time
        id: build-timing
        shell: bash
        run: echo "build_start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR for layer cache
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: echo "${GITHUB_TOKEN}" | sudo podman login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build Image
        id: build-image
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_CACHE_WRITE: ${{ github.event_name != 'pull_request' && '1' || '0' }}
          MATRIX_BASE_NAME: ${{ matrix.base_name }}
          MATRIX_STREAM_NAME: ${{ matrix.stream_name }}
          MATRIX_IMAGE_FLAVOR: ${{ matrix.image_flavor }}
          INPUT_KERNEL_PIN: ${{ inputs.kernel_pin }}
          REPO_ORGANIZATION: ${{ github.repository_owner }}
        with:
          timeout_minutes: 120
          max_attempts: 3
          retry_wait_seconds: 300
          new_command_on_retry: ''
          command: |
            sudo -E "$(command -v just)" repo_organization="${REPO_ORGANIZATION}" \
                      build-ghcr "${MATRIX_BASE_NAME}" \
                                 "${MATRIX_STREAM_NAME}" \
                                 "${MATRIX_IMAGE_FLAVOR}" \
                                 "${INPUT_KERNEL_PIN}"

      - name: Record build duration
        id: build-duration
        shell: bash
        run: |
          BUILD_END=$(date +%s)
          BUILD_ELAPSED=$(( BUILD_END - ${{ steps.build-timing.outputs.build_start }} ))
          echo "build_seconds=${BUILD_ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "Build duration: $(( BUILD_ELAPSED / 60 ))m $(( BUILD_ELAPSED % 60 ))s"

      - name: Save DNF package cache
        if: always() && !cancelled()
        uses: projectbluefin/actions/bootc-build/dnf-cache@v1
        with:
          action: save
          cache-name: ${{ steps.setup-cache.outputs.cache_name }}
          architecture: ${{ matrix.architecture }}
          allow-write: ${{ steps.setup-cache.outputs.allow_cache_write }}
          image-flavor: ${{ matrix.image_flavor }}
          cache-bust: ${{ hashFiles('**/Containerfile') }}

      - name: Setup Syft
        id: setup-syft
        # Generate SBOM for all non-PR builds including testing stream.
        # The SBOM artifact is needed by execute-release for release notes.
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: v1.44.0

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        id: generate-sbom
        env:
          MATRIX_BASE_NAME: ${{ matrix.base_name }}
          MATRIX_STREAM_NAME: ${{ matrix.stream_name }}
          MATRIX_IMAGE_FLAVOR: ${{ matrix.image_flavor }}
          SYFT_CMD: ${{ steps.setup-syft.outputs.cmd }}
        run: |
          sudo -E "$(command -v just)" gen-sbom "${MATRIX_BASE_NAME}" \
                            "${MATRIX_STREAM_NAME}" \
                            "${MATRIX_IMAGE_FLAVOR}" \
                            "${SYFT_CMD}"

      - name: Stage SBOM for release artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/sbom-upload
          cp "sbom_out/${{ env.IMAGE_NAME }}/sbom.json" "/tmp/sbom-upload/${{ env.IMAGE_NAME }}.sbom.json"

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ env.IMAGE_NAME }}
          path: /tmp/sbom-upload/
          retention-days: 7

      - name: Apply package update-interval xattrs
        # Sets user.update-interval xattrs on RPM-owned files so chunkah can
        # pack packages by update cadence (weekly/monthly/quarterly/yearly).
        # files/pkg-intervals.tsv is maintained by the pkg-cadence workflow.
        # Skip on PRs and testing stream — rechunk is also skipped there.
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        uses: projectbluefin/actions/bootc-build/apply-pkg-intervals@v1
        with:
          source-image: localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          intervals-file: files/pkg-intervals.tsv

      - name: Record rechunk start time
        id: rechunk-timing
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        shell: bash
        run: echo "rechunk_start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Rechunk Image
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        id: rechunk-image
        uses: projectbluefin/actions/bootc-build/chunka@v1
        with:
          source-image: localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          max-layers: ${{ inputs.max_layers }}

      - name: Record rechunk duration
        id: rechunk-duration
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        shell: bash
        run: |
          RECHUNK_END=$(date +%s)
          RECHUNK_ELAPSED=$(( RECHUNK_END - ${{ steps.rechunk-timing.outputs.rechunk_start }} ))
          echo "rechunk_seconds=${RECHUNK_ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "Rechunk duration: $(( RECHUNK_ELAPSED / 60 ))m $(( RECHUNK_ELAPSED % 60 ))s"

      - name: Secureboot Check
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        id: secureboot
        shell: bash
        env:
          MATRIX_BASE_NAME: ${{ matrix.base_name }}
          MATRIX_IMAGE_FLAVOR: ${{ matrix.image_flavor }}
        run: |
          sudo -E "$(command -v just)" secureboot "${MATRIX_BASE_NAME}" \
                          "${DEFAULT_TAG}" \
                          "${MATRIX_IMAGE_FLAVOR}"

      - name: Export image to OCI dir (PR only)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          mkdir -p "${IMAGE_NAME}_build"
          sudo podman save --format oci-dir -o "${IMAGE_NAME}_build" "${IMAGE_NAME}:${DEFAULT_TAG}"

      - name: Generate tags
        id: generate-tags
        shell: bash
        env:
          MATRIX_BASE_NAME: ${{ matrix.base_name }}
          MATRIX_STREAM_NAME: ${{ matrix.stream_name }}
          MATRIX_IMAGE_FLAVOR: ${{ matrix.image_flavor }}
          INPUT_KERNEL_PIN: ${{ inputs.kernel_pin }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_NUMBER: ${{ github.event.number }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          EFFECTIVE_EVENT="${GITHUB_EVENT_NAME}"
          EFFECTIVE_NUMBER="${GITHUB_EVENT_NUMBER}"
          if [[ -n "${INPUT_PR_NUMBER}" ]]; then
            EFFECTIVE_EVENT="pull_request"
            EFFECTIVE_NUMBER="${INPUT_PR_NUMBER}"
          fi

          alias_tags="$(just generate-build-tags \
                     "${MATRIX_BASE_NAME}" \
                     "${MATRIX_STREAM_NAME}" \
                     "${MATRIX_IMAGE_FLAVOR}" \
                     "${INPUT_KERNEL_PIN}" \
                     "1" \
                     "$(sudo podman inspect "localhost/${IMAGE_NAME}:${DEFAULT_TAG}" | jq -r '.[].Config.Labels["org.opencontainers.image.version"]')" \
                     "${EFFECTIVE_EVENT}" \
                     "${EFFECTIVE_NUMBER}")"

          echo "Tags for this Action..."
          echo "$alias_tags"
          echo "alias_tags=${alias_tags}" >> "$GITHUB_OUTPUT"

      - name: Tag Images
        shell: bash
        env:
          ALIAS_TAGS: ${{ steps.generate-tags.outputs.alias_tags }}
        run: |
          set -eoux pipefail
          sudo -E "$(command -v just)" tag-images "${IMAGE_NAME}" \
                          "${DEFAULT_TAG}" \
                          "${ALIAS_TAGS}"

      - name: Compute push tags
        id: compute-push-tags
        shell: bash
        env:
          DEFAULT_TAG: ${{ env.DEFAULT_TAG }}
          ALIAS_TAGS: ${{ steps.generate-tags.outputs.alias_tags }}
          PUBLISH_STREAM_TAG: ${{ inputs.publish_stream_tag }}
        run: |
          set -euo pipefail
          if [[ "${PUBLISH_STREAM_TAG}" == "false" ]]; then
            # Exclude the stream tag (:testing) — it will be promoted to :testing
            # by post-build-e2e.yml only after smoke+common suites pass.
            # Use the first alias tag as the primary push target.
            read -r -a ALIAS_ARR <<< "${ALIAS_TAGS}"
            if [[ ${#ALIAS_ARR[@]} -eq 0 ]]; then
              echo "::error::publish_stream_tag=false but no alias tags are available — cannot push"
              exit 1
            fi
            echo "push_default=${ALIAS_ARR[0]}" >> "$GITHUB_OUTPUT"
            echo "push_tags=${ALIAS_TAGS}" >> "$GITHUB_OUTPUT"
            echo "Stream tag (${DEFAULT_TAG}) excluded — will be promoted after e2e gate"
          else
            echo "push_default=${DEFAULT_TAG}" >> "$GITHUB_OUTPUT"
            echo "push_tags=${DEFAULT_TAG} ${ALIAS_TAGS}" >> "$GITHUB_OUTPUT"
          fi

      - name: Export image for scanning
        shell: bash
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DEFAULT_TAG: ${{ env.DEFAULT_TAG }}
        run: |
          set -eoux pipefail
          # docker-archive format is required by trivy --input; oci-archive is not supported.
          # Use the localhost/ prefix to reference the rootful podman image store.
          sudo podman save --format docker-archive \
            -o /tmp/scan-image.tar \
            "localhost/${IMAGE_NAME}:${DEFAULT_TAG}"

      - name: Scan image for vulnerabilities
        continue-on-error: true  # Trivy DB issues (e.g. new OS families) must never block builds
        uses: projectbluefin/actions/bootc-build/scan-image@v1
        with:
          image: localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          input: /tmp/scan-image.tar
          severity-threshold: ${{ inputs.scan-severity-threshold }}
          exit-code: '0'  # Non-blocking: CVEs reported via SARIF, never gate builds (Option D)
          create-issue: ${{ github.event_name != 'pull_request' && github.repository_owner == 'projectbluefin' && 'true' || 'false' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        id: push
        if: github.event_name != 'pull_request'
        uses: projectbluefin/actions/bootc-build/push-image@v1
        with:
          image-name: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.compute-push-tags.outputs.push_tags }}
          default-tag: ${{ steps.compute-push-tags.outputs.push_default }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Record push duration
        id: push-duration
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          # push-image action handles its own timing internally; we measure wall-clock from here
          echo "push_seconds=0" >> "$GITHUB_OUTPUT"

      - name: Upload OCI dir as Artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ env.IMAGE_NAME }}_build
          if-no-files-found: warn
          retention-days: 1

      - name: PR Testing Instructions
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "### 🫐 Test this PR build"
            echo ""
            echo "Download the \`.oci\` artifact, unzip it, then:"
            echo '```bash'
            echo "sudo bootc switch --transport oci /absolute/path/to/${{ env.IMAGE_NAME }}_build"
            echo '```'
            echo "To go back:"
            echo '```bash'
            echo "sudo bootc switch --enforce-container-sigpolicy ghcr.io/projectbluefin/${{ env.IMAGE_NAME }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build telemetry summary
        if: always()
        shell: bash
        run: |
          BUILD_S=${{ steps.build-duration.outputs.build_seconds || 0 }}
          RECHUNK_S=${{ steps.rechunk-duration.outputs.rechunk_seconds || 0 }}
          BUILD_START=${{ steps.build-timing.outputs.build_start || 0 }}
          SUMMARY_END=$(date +%s)
          WALL_CLOCK_S=0
          if [[ "${BUILD_START}" -gt 0 ]]; then
            WALL_CLOCK_S=$(( SUMMARY_END - BUILD_START ))
          fi

          IMAGE_SIZE=$(sudo podman image inspect "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}" \
            --format '{{.Size}}' 2>/dev/null || echo "0")
          IMAGE_SIZE_MB=$(( IMAGE_SIZE / 1024 / 1024 ))
          LAYER_COUNT=$(sudo podman image inspect "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}" \
            --format '{{len .RootFS.Layers}}' 2>/dev/null || echo "?")

          {
            echo "## 📊 Build Telemetry: ${{ env.IMAGE_NAME }}"
            echo ""
            echo "| Stage | Duration |"
            echo "|-------|----------|"
            printf "| Build | %dm %ds |\n" $(( BUILD_S / 60 )) $(( BUILD_S % 60 ))
            if [[ "${RECHUNK_S}" -gt 0 ]]; then
              printf "| Rechunk | %dm %ds |\n" $(( RECHUNK_S / 60 )) $(( RECHUNK_S % 60 ))
            fi
            printf "| **Total wall-clock** | **%dm %ds** |\n" $(( WALL_CLOCK_S / 60 )) $(( WALL_CLOCK_S % 60 ))
            echo ""
            echo "**Image size (uncompressed):** ${IMAGE_SIZE_MB} MB"
            echo "**Layer count:** ${LAYER_COUNT}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write digest to artifact
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          MATRIX_BASE_NAME: ${{ matrix.base_name }}
          MATRIX_IMAGE_FLAVOR: ${{ matrix.image_flavor }}
          MATRIX_ARCHITECTURE: ${{ matrix.architecture }}
          PUSH_DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests

          # Map runner architecture names to OCI platform names for create-manifest
          case "${MATRIX_ARCHITECTURE}" in
            x86_64)  OCI_PLATFORM="amd64" ;;
            aarch64) OCI_PLATFORM="arm64" ;;
            *)       OCI_PLATFORM="${MATRIX_ARCHITECTURE}" ;;
          esac

          # Write in both formats:
          # 1. Legacy `=` format consumed by weekly-testing-promotion.yml and post-testing-e2e.yml
          # 2. New `|` format for multi-arch manifest creation in collect-digests
          echo "${IMAGE_NAME}=${PUSH_DIGEST}" >> "/tmp/digests/${MATRIX_IMAGE_FLAVOR}-${MATRIX_BASE_NAME}-${MATRIX_ARCHITECTURE}.txt"
          echo "${IMAGE_NAME}|${OCI_PLATFORM}|${PUSH_DIGEST}" >> "/tmp/digests/${MATRIX_IMAGE_FLAVOR}-${MATRIX_BASE_NAME}-${MATRIX_ARCHITECTURE}.txt"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digest-${{ inputs.stream_name }}-${{ matrix.base_name }}-${{ matrix.image_flavor }}-${{ matrix.architecture }}
          path: /tmp/digests/
          retention-days: 7

      - name: Fix sigstore cache permissions
        if: github.event_name != 'pull_request'
        run: sudo chown -R "$(id -u):$(id -g)" "${HOME}/.sigstore" 2>/dev/null || true

      - name: Sign, publish SBOM, and attest
        if: github.event_name != 'pull_request'
        continue-on-error: true  # Never block image publishing — signing/SBOM failures are non-fatal
        uses: projectbluefin/actions/bootc-build/sign-and-publish@v1
        with:
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          digest: ${{ steps.push.outputs.digest }}
          signing-mode: keyless
          generate-sbom: ${{ inputs.stream_name != 'testing' && 'true' || 'false' }}
          push-attestation: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}

      - name: Verify rechunk metadata preserved
        if: github.event_name != 'pull_request' && inputs.stream_name != 'testing'
        run: |
          set -euo pipefail
          IMAGE_REF="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
          MANIFEST=$(skopeo inspect --raw "docker://${IMAGE_REF}")
          if echo "${MANIFEST}" | jq -e '
            .layers // [] |
            map(select(.annotations != null and (.annotations | has("ostree.components")))) |
            length > 0
          ' > /dev/null 2>&1; then
            echo "✅ ostree.components annotations present — rechunk metadata preserved"
          else
            echo "⚠️  ostree.components annotations missing — rechunk metadata may have been stripped"
          fi

  check:
    name: Check all ${{ inputs.stream_name }} builds successful
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [build_container]
    steps:
      - name: Check Jobs
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          echo "Job status:"
          echo "$JOBS" | jq -r 'to_entries[] | " - \(.key): \(.value.result)"'

          for i in $(echo "$JOBS" | jq -r 'to_entries[] | .value.result'); do
            if [ "$i" != "success" ] && [ "$i" != "skipped" ]; then
              echo ""
              echo "Status check not okay!"
              exit 1
            fi
          done

  collect-digests:
    name: Collect image digests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [check]
    outputs:
      digests: ${{ steps.merge.outputs.digests || steps.empty.outputs.digests }}
    steps:
      - name: Download all digest artifacts
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: image-digest-${{ inputs.stream_name }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Merge digests
        if: github.event_name != 'pull_request'
        id: merge
        shell: bash
        run: |
          set -euo pipefail

          # Each line is: image_name|oci_platform|digest
          # Build nested JSON: { "image_name": { "platform": "digest", ... }, ... }
          # Single-arch builds produce { "image_name": { "amd64": "sha256:..." } }
          # Multi-arch builds produce { "image_name": { "amd64": "sha256:...", "arm64": "sha256:..." } }
          DIGESTS=$(cat /tmp/digests/*.txt | jq -Rs '
            split("\n")
            | map(select(length > 0))
            | map(split("|"))
            | map(select(length == 3))
            | reduce .[] as $row ({}; .[$row[0]][$row[1]] = $row[2])
          ')

          {
            echo "digests<<EOF"
            echo "${DIGESTS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set empty digests
        if: github.event_name == 'pull_request'
        id: empty
        run: |
          echo 'digests={}' >> "$GITHUB_OUTPUT"
