name: Unit Tests

on:
  push:
    branches: [main]
    paths:
      - "actions/**"
      - "bootc-build/create-release/scripts/**"
      - "bootc-build/chunka/**"
      - "bootc-build/generate-tags/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/unit-tests.yml"
  pull_request:
    paths:
      - "actions/**"
      - "bootc-build/chunka/**"
      - "bootc-build/create-release/scripts/**"
      - "bootc-build/generate-tags/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/unit-tests.yml"

permissions: {}

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/bats \
            --cov=bootc-build/chunka \
            --cov=bootc-build/create-release/scripts \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-fail-under=75
