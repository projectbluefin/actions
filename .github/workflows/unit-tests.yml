name: Unit Tests

on:
  push:
    branches: [main]
    paths:
      - "actions/**"
      - "bootc-build/create-release/scripts/**"
      - "bootc-build/chunka/**"
      - "bootc-build/detect-changes/**"
      - "bootc-build/generate-tags/**"
      - "scripts/**"
      - ".github/actions/**"
      - "tests/**"
      - ".github/workflows/unit-tests.yml"
  pull_request:
    paths:
      - "actions/**"
      - "bootc-build/chunka/**"
      - "bootc-build/create-release/scripts/**"
      - "bootc-build/detect-changes/**"
      - "bootc-build/generate-tags/**"
      - "scripts/**"
      - ".github/actions/**"
      - "tests/**"
      - ".github/workflows/unit-tests.yml"

permissions: {}

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/bats \
            --cov=bootc-build/chunka \
            --cov=bootc-build/create-release/scripts \
            --cov=scripts \
            --cov=.github/actions/render-pr-body \
            --cov=.github/actions/render-gate-section \
            --cov-report=term-missing \
            --cov-fail-under=75

  bats:
    name: bats
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install bats
        run: |
          sudo npm install -g bats@1.13.0
          bats --version

      - name: Run bats tests
        run: bats --print-output-on-failure tests/bats/
