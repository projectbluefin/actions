name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 01:30 UTC (off-peak)
    - cron: '30 1 * * 1'

# Read-all for scorecard analysis; write only at job level where needed
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      # Required to upload results to GitHub Security tab
      security-events: write
      # Required for signing attestations with keyless approach
      id-token: write
      # Required to read source code
      contents: read
      # Required to detect GitHub Actions workflow files
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to Scorecard dashboard (makes score publicly visible)
          publish_results: true

      - name: Upload Scorecard results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@9e8d0789d4a0fa9ceb6b1738f7e269594bdd67f0 # v3.28.9
        with:
          sarif_file: results.sarif
