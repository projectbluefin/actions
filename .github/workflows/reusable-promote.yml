# reusable-promote.yml — shared promote-testing-to-main logic
#
# Consolidates the per-image promote-testing-to-main.yml workflows:
#   projectbluefin/bluefin     (~343 LoC) → thin caller (~30 LoC)
#   projectbluefin/bluefin-lts (~349 LoC) → thin caller (~30 LoC)
#   projectbluefin/dakota      (~183 LoC) → thin caller (~30 LoC)
#
# Implements consistency-audit C1 from projectbluefin/common.

name: reusable-promote

on:
  workflow_call:
    inputs:
      variants:
        description: >-
          JSON array of variant names,
          e.g. '["dakota","dakota-nvidia"]'
        required: true
        type: string
      cosign_identity_regexp:
        description: >-
          Regex for cosign certificate identity,
          e.g. '^https://github\.com/projectbluefin/(dakota|actions)/\.github/workflows/'
        required: true
        type: string
      registry:
        description: 'GHCR registry prefix'
        required: false
        type: string
        default: 'ghcr.io/projectbluefin'
      run_e2e:
        description: 'Whether the release-gate should require a passing e2e run'
        required: false
        type: boolean
        default: false
      e2e_suite:
        description: 'testsuite suite identifier (smoke, common, lts, dakota)'
        required: false
        type: string
        default: 'smoke'
      e2e_image:
        description: 'Full image ref for e2e gate; if empty, e2e step is skipped'
        required: false
        type: string
        default: ''
      lts_floor_days:
        description: 'Min days since last promotion before allowing a new one (LTS=7, others=0)'
        required: false
        type: number
        default: 0

permissions:
  contents: read

concurrency:
  group: promote-testing-to-main-${{ github.event.repository.name }}
  cancel-in-progress: false

jobs:
  promote:
    name: Resolve digests and maintain promotion PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: read
      pull-requests: write
    outputs:
      changed: ${{ steps.branch.outputs.changed }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      gate_variants: ${{ steps.gate-variants.outputs.json }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Apply LTS floor (skip if promoted too recently)
        if: inputs.lts_floor_days > 0
        id: lts-floor
        run: |
          set -euo pipefail
          LAST=$(git log -1 --format=%ct origin/main -- .github/release-state.yaml 2>/dev/null || echo 0)
          NOW=$(date +%s)
          AGE=$(( (NOW - LAST) / 86400 ))
          FLOOR=${{ inputs.lts_floor_days }}
          if [ "$AGE" -lt "$FLOOR" ]; then
            echo "::notice::LTS floor not met: ${AGE}d < ${FLOOR}d — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to GHCR for skopeo
        if: steps.lts-floor.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "$GH_TOKEN" | skopeo login ghcr.io \
            --username "x-access-token" \
            --password-stdin

      - name: Resolve current :testing digests
        if: steps.lts-floor.outputs.skip != 'true'
        id: digests
        env:
          REGISTRY: ${{ inputs.registry }}
          VARIANTS: ${{ inputs.variants }}
        run: |
          set -euo pipefail
          {
            printf '# Managed by reusable-promote.yml — do not edit manually.\n'
            printf '# Merging the PR that updates this file promotes these digests to :stable.\n'
            printf 'testing:\n'
            echo "${VARIANTS}" | jq -r '.[]' | while read -r variant; do
              digest=$(skopeo inspect \
                --format '{{.Digest}}' \
                "docker://${REGISTRY}/${variant}:testing")
              if [ -z "$digest" ]; then
                echo "::error::Could not resolve digest for ${variant}:testing"
                exit 1
              fi
              printf '  %s: "%s"\n' "${variant}" "${digest}"
            done
            printf 'updated_at: "%s"\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > /tmp/release-state.yaml

      - name: Update or create promotion branch
        if: steps.lts-floor.outputs.skip != 'true'
        id: branch
        env:
          GH_TOKEN: ${{ github.token }}
          PROMOTION_BRANCH: auto/promote-testing-to-main
        run: |
          set -euo pipefail
          git fetch origin "${PROMOTION_BRANCH}" 2>/dev/null || true
          git checkout -B "${PROMOTION_BRANCH}" origin/main

          mkdir -p .github
          cp /tmp/release-state.yaml .github/release-state.yaml
          git add .github/release-state.yaml

          if git diff --cached --quiet; then
            echo "::notice::No digest changes — nothing to do"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "ci: update testing image digests for stable promotion"
          git push --force-with-lease origin "${PROMOTION_BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Fetch last stable release metadata
        if: steps.branch.outputs.changed == 'true'
        id: last-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RELEASE_JSON=$(gh release list \
            --repo "${{ github.repository }}" \
            --limit 1 \
            --json tagName,publishedAt \
            --jq '.[0]' 2>/dev/null || echo '{}')

          TAG=$(echo "${RELEASE_JSON}" | jq -r '.tagName // empty')
          PUBLISHED=$(echo "${RELEASE_JSON}" | jq -r '.publishedAt // empty')

          if [[ -n "${TAG}" && -n "${PUBLISHED}" ]]; then
            DAYS=$(( ( $(date +%s) - $(date -d "${PUBLISHED}" +%s) ) / 86400 ))
            {
              echo "days=${DAYS}"
              echo "tag=${TAG}"
              echo "url=https://github.com/${{ github.repository }}/releases/tag/${TAG}"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "days="
              echo "tag="
              echo "url="
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Render promotion PR body
        if: steps.branch.outputs.changed == 'true'
        id: render
        env:
          GH_TOKEN:  ${{ github.token }}
          VARIANTS:  ${{ inputs.variants }}
          REGISTRY:  ${{ inputs.registry }}
          RUN_URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DAYS_AGO:  ${{ steps.last-release.outputs.days }}
          LAST_TAG:  ${{ steps.last-release.outputs.tag }}
          LAST_URL:  ${{ steps.last-release.outputs.url }}
        run: |
          set -euo pipefail

          # Build variants-with-digests JSON from release-state.yaml using awk (no PyYAML dep)
          VARIANTS_JSON=$(grep '^  [a-z]' .github/release-state.yaml \
            | awk '{img=$1; gsub(/:/, "", img); dig=$2; gsub(/"/, "", dig);
                    printf "{\"image\":\"%s\",\"digest\":\"%s\"},", img, dig}' \
            | sed 's/,$//')
          VARIANTS_JSON="[${VARIANTS_JSON}]"

          PRIMARY_IMAGE=$(echo "${VARIANTS}" | jq -r 'if .[0] | type == "string" then .[0] else .[0].image end')
          PROJECT_NAME=$(echo "${PRIMARY_IMAGE}" | sed 's/-/ /g; s/\b\(.\)/\u\1/g')
          DATE="$(date -u +%Y-%m-%d)"

          DAYS_ARGS=()
          [[ -n "${DAYS_AGO}" ]] && DAYS_ARGS+=(--days-since-stable "${DAYS_AGO}")
          TAG_ARGS=()
          [[ -n "${LAST_TAG}" ]] && TAG_ARGS+=(--last-release-tag "${LAST_TAG}" --last-release-url "${LAST_URL}")

          python3 scripts/render_pr_body.py \
            --project-name  "${PROJECT_NAME}" \
            --primary-image "${PRIMARY_IMAGE}" \
            --variants-json "${VARIANTS_JSON}" \
            --repo          "${{ github.repository }}" \
            --run-url       "${RUN_URL}" \
            --date          "${DATE}" \
            "${DAYS_ARGS[@]}" \
            "${TAG_ARGS[@]}" \
            --output        /tmp/pr-body.md

          # Append BST component-version table when element files are present
          # (dakota-specific: tracks gnome-build-meta and freedesktop-sdk refs)
          LAST_SHA=$(git log -1 --format=%H origin/main -- .github/release-state.yaml 2>/dev/null || echo "")
          component_row() {
            local bst="$1" label="$2"
            [ -f "$bst" ] || return
            local track new_ref old_ref mark
            track=$(grep -m1 'track:' "$bst" | sed 's/.*track: *//' | tr -d '"' | xargs || echo "—")
            new_ref=$(grep -m1 'ref:' "$bst" | sed 's/.*ref: *//' | tr -d '"' | cut -c1-12 || echo "—")
            if [ -n "${LAST_SHA}" ]; then
              old_ref=$(git show "${LAST_SHA}:${bst}" 2>/dev/null \
                | grep -m1 'ref:' | sed 's/.*ref: *//' | tr -d '"' | cut -c1-12 || echo "—")
              [ "$old_ref" = "$new_ref" ] && mark="" || mark=" ⬆"
            else
              old_ref="—"; mark=""
            fi
            # shellcheck disable=SC2016  # \n in printf format is intentional, not a variable
            printf '| `%s` | `%s` | `%s` → `%s`%s |\n' "$label" "$track" "$old_ref" "$new_ref" "$mark"
          }
          COMP_TABLE=$(
            component_row elements/gnome-build-meta.bst gnome-build-meta
            component_row elements/freedesktop-sdk.bst  freedesktop-sdk
          )
          if [ -n "${COMP_TABLE}" ]; then
            printf '\n### Components\n\n| Component | Track | Ref |\n|---|---|---|\n%s\n' "${COMP_TABLE}" >> /tmp/pr-body.md
          fi

          echo "pr_title=ci(promote): ${PRIMARY_IMAGE} testing → stable ${DATE}" >> "$GITHUB_OUTPUT"

      - name: Open or update promotion PR
        if: steps.branch.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PROMOTION_BRANCH: auto/promote-testing-to-main
          PR_TITLE: ${{ steps.render.outputs.pr_title }}
        run: |
          set -euo pipefail

          EXISTING=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${PROMOTION_BRANCH}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh pr edit "${EXISTING}" \
              --title "${PR_TITLE}" \
              --body-file /tmp/pr-body.md
            echo "pr_number=${EXISTING}" >> "$GITHUB_OUTPUT"
          else
            PR_URL=$(gh pr create \
              --repo "${{ github.repository }}" \
              --head "${PROMOTION_BRANCH}" \
              --base main \
              --title "${PR_TITLE}" \
              --label "release/ready" \
              --body-file /tmp/pr-body.md)
            echo "pr_number=${PR_URL##*/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Normalize variants for release gate
        if: steps.branch.outputs.changed == 'true'
        id: gate-variants
        env:
          VARIANTS: ${{ inputs.variants }}
        run: |
          set -euo pipefail
          JSON=$(jq -c '[.[] | if type == "string" then {image: .} else . end]' <<<"${VARIANTS}")
          echo "json=${JSON}" >> "$GITHUB_OUTPUT"

  gate:
    name: Release gate checks
    needs: [promote]
    if: needs.promote.outputs.changed == 'true'
    permissions:
      actions: read
      contents: read
      issues: write
      packages: read
      pull-requests: write
    uses: projectbluefin/actions/.github/workflows/reusable-release-gate.yml@v1
    with:
      repo: ${{ github.repository }}
      pr_number: ${{ needs.promote.outputs.pr_number }}
      registry: ${{ inputs.registry }}
      variants: ${{ needs.promote.outputs.gate_variants }}
      cosign_identity_regexp: ${{ inputs.cosign_identity_regexp }}
      target_tag: testing
      run_e2e: ${{ inputs.run_e2e }}
      e2e_suites: ${{ inputs.e2e_suite }}
      e2e_image: ${{ inputs.e2e_image }}
    secrets: inherit
