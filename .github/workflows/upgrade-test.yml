name: bootc Upgrade and Rollback Test
# Reusable workflow: boots a bootc OCI image in QEMU and runs the
# projectbluefin/testsuite lifecycle suite (upgrade + rollback).
#
# Any bootc image project can gate releases with:
#   uses: projectbluefin/actions/.github/workflows/upgrade-test.yml@v1
#   with:
#     image: ghcr.io/ublue-os/bluefin:stable-20240601
#     target-image: ghcr.io/ublue-os/bluefin:stable
#
# The workflow boots 'image' (the from / currently deployed version),
# runs 'bootc upgrade' inside the VM which will resolve 'target-image'
# at the same ref, verifies the new deployment boots, then rolls back.
#
# For same-base upgrades (stable → stable, lts → lts):
#   'bootc upgrade' picks up the newest digest at the target tag naturally.
#
# Example callers:
#   projectbluefin/bluefin    — stable-<date> → stable
#   projectbluefin/bluefin-lts — lts-<date>   → lts
#
# The lifecycle suite validates: bootc status, upgrade, reboot into new
# deployment, rollback to previous deployment, and /etc persistence.
# See: https://github.com/projectbluefin/testsuite/blob/main/tests/lifecycle/features/bootc.feature

on:
  workflow_call:
    inputs:
      image:
        description: >
          The image to boot — the "from" / currently deployed version.
          Full OCI reference including tag or digest.
          Example: ghcr.io/ublue-os/bluefin:stable-20240601
          Example: ghcr.io/ublue-os/bluefin@sha256:abc123
        required: true
        type: string
      target-image:
        description: >
          The image to upgrade to — the "to" / new build being validated.
          Full OCI reference including tag or digest.
          Example: ghcr.io/ublue-os/bluefin:stable
          Example: ghcr.io/ublue-os/bluefin@sha256:def456
          When 'image' and 'target-image' share the same base ref, 'bootc upgrade'
          inside the VM will naturally resolve to this image. For cross-image
          upgrades (different repo or org) the lifecycle switch scenario is used.
          If omitted, 'bootc upgrade' upgrades to whatever is current at the
          booted image's reference.
        required: false
        type: string
        default: ""
      suites:
        description: >
          Comma-separated test suites to run.
          Default is 'lifecycle' which covers: bootc status, upgrade, rollback,
          /etc merge, and idempotency.
          Any suite supported by projectbluefin/testsuite may be added.
        type: string
        default: "lifecycle"
      skip_native_apps:
        description: "Skip @native_app scenarios (non-Flatpak app tests)"
        type: boolean
        default: false
      screenshot_flatpaks:
        description: >
          Comma-separated Flatpak app IDs to launch-and-screenshot after the
          test run. Leave empty to skip.
        type: string
        default: ""

    outputs:
      result:
        description: "Outcome of the upgrade test job: success or failure"
        value: ${{ jobs.upgrade-test.result }}

permissions:
  contents: read
  packages: write   # required by testsuite e2e.yml for screenshot OCI push

jobs:
  upgrade-test:
    name: >
      Upgrade & rollback
      ${{ inputs.target-image != '' && format('{0} → {1}', inputs.image, inputs.target-image) || inputs.image }}
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@4ca86c64f3ed92dabe24d31f5a08b82fe3a3df8a # main
    permissions:
      contents: read
      packages: write
    with:
      image: ${{ inputs.image }}
      suites: ${{ inputs.suites }}
      skip_native_apps: ${{ inputs.skip_native_apps }}
      screenshot_flatpaks: ${{ inputs.screenshot_flatpaks }}
