name: Reusable Release Gate

on:
  workflow_call:
    inputs:
      repo:
        description: Repository name in owner/repo format for concurrency and API calls
        required: true
        type: string
      pr_number:
        description: PR number to post status on (overrides event context; required for workflow_dispatch callers)
        required: false
        default: ''
        type: string
      head_sha:
        description: PR head SHA for e2e lookup (overrides event context; required for workflow_dispatch callers)
        required: false
        default: ''
        type: string
      registry:
        description: GHCR registry prefix
        required: false
        default: ghcr.io/projectbluefin
        type: string
      variants:
        description: JSON array of image variants (objects with "image" key or plain image-name strings)
        required: true
        type: string
      cosign_identity_regexp:
        description: Regular expression for cosign certificate identity verification
        required: true
        type: string
      target_tag:
        description: Source tag to resolve digests from
        required: false
        default: testing
        type: string
      run_e2e:
        description: Whether to require a recent post-testing-e2e result for the PR head SHA
        required: false
        default: true
        type: boolean
      e2e_suites:
        description: Comma-separated suite list for caller documentation and status output
        required: false
        default: smoke,common
        type: string
      e2e_image:
        description: Full image ref associated with the e2e gate; if empty, e2e is skipped
        required: false
        default: ''
        type: string
      e2e_stale_after_minutes:
        description: How old the latest relevant e2e run can be before the gate re-dispatches it
        required: false
        default: 120
        type: number
    outputs:
      ready:
        description: Whether all gate checks passed
        value: ${{ jobs.gate.outputs.ready }}
      digests:
        description: JSON map of resolved image digests
        value: ${{ jobs.gate.outputs.digests }}

permissions: {}

concurrency:
  group: release-gate-${{ inputs.repo }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      issues: write
      packages: read
      pull-requests: write
    outputs:
      ready: ${{ steps.aggregate.outputs.ready }}
      digests: ${{ steps.resolve.outputs.digests }}
    steps:
      - name: Authenticate to GHCR for skopeo reads
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_HOST: ${{ inputs.registry }}
        run: |
          set -euo pipefail
          registry_host="${REGISTRY_HOST:-}"
          registry_host="${registry_host#docker://}"
          registry_host="${registry_host%%/*}"
          echo "$GH_TOKEN" | skopeo login "$registry_host" --username "${{ github.actor }}" --password-stdin

      - name: Resolve digests
        id: resolve
        shell: bash
        env:
          REGISTRY: ${{ inputs.registry }}
          TARGET_TAG: ${{ inputs.target_tag }}
          VARIANTS_JSON: ${{ inputs.variants }}
        run: |
          set -euo pipefail
          digests='{}'
          rows=''
          failed=0
          count=0

          while IFS= read -r variant; do
            [ -n "$variant" ] || continue
            image=$(jq -r 'if type == "string" then . else .image end' <<<"$variant")
            count=$((count + 1))
            ref="${REGISTRY}/${image}:${TARGET_TAG}"

            if digest=$(skopeo inspect --format '{{.Digest}}' "docker://${ref}" 2>/dev/null); then
              digests=$(jq -c --arg image "$image" --arg digest "$digest" '. + {($image): $digest}' <<<"$digests")
              rows+="${image}|${digest}"$'\n'
            else
              failed=1
              rows+="${image}|ERROR"$'\n'
            fi
          done < <(jq -c '.[]' <<<"$VARIANTS_JSON")

          if [ "$failed" -eq 0 ]; then
            ok=true
            summary="Resolved ${count} digest(s) from ${TARGET_TAG}."
          else
            ok=false
            summary="Failed to resolve one or more digests from ${TARGET_TAG}."
          fi

          {
            echo "ok=${ok}"
            echo "summary=${summary}"
            echo "digests=${digests}"
            echo 'rows<<EOF'
            printf '%s' "$rows"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify cosign signatures
        id: verify
        shell: bash
        env:
          DIGESTS_JSON: ${{ steps.resolve.outputs.digests }}
          IDENTITY_REGEXP: ${{ inputs.cosign_identity_regexp }}
          REGISTRY: ${{ inputs.registry }}
          VARIANTS_JSON: ${{ inputs.variants }}
        run: |
          set -euo pipefail
          results='{}'
          rows=''
          failed=0

          if [ '${{ steps.resolve.outputs.ok }}' != 'true' ]; then
            {
              echo 'ok=false'
              echo 'summary=Skipped signature verification because digest resolution failed.'
              echo 'results={}'
              echo 'rows<<EOF'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r variant; do
            [ -n "$variant" ] || continue
            image=$(jq -r 'if type == "string" then . else .image end' <<<"$variant")
            digest=$(jq -r --arg image "$image" '.[$image] // empty' <<<"$DIGESTS_JSON")

            if [ -z "$digest" ]; then
              failed=1
              results=$(jq -c --arg image "$image" '. + {($image): "failed"}' <<<"$results")
              rows+="${image}|failed|digest missing"$'\n'
              continue
            fi

            ref="${REGISTRY}/${image}@${digest}"
            if cosign verify \
              --certificate-identity-regexp "$IDENTITY_REGEXP" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$ref" >/dev/null 2>&1; then
              results=$(jq -c --arg image "$image" '. + {($image): "passed"}' <<<"$results")
              rows+="${image}|passed|signature verified"$'\n'
            else
              failed=1
              results=$(jq -c --arg image "$image" '. + {($image): "failed"}' <<<"$results")
              rows+="${image}|failed|signature verification failed"$'\n'
            fi
          done < <(jq -c '.[]' <<<"$VARIANTS_JSON")

          if [ "$failed" -eq 0 ]; then
            ok=true
            summary='All resolved digests passed cosign verification.'
          else
            ok=false
            summary='One or more digests failed cosign verification.'
          fi

          {
            echo "ok=${ok}"
            echo "summary=${summary}"
            echo "results=${results}"
            echo 'rows<<EOF'
            printf '%s' "$rows"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Determine whether E2E lookup is required
        id: e2e-precheck
        shell: bash
        env:
          E2E_IMAGE: ${{ inputs.e2e_image }}
          RUN_E2E: ${{ inputs.run_e2e }}
        run: |
          set -euo pipefail

          if [ "$RUN_E2E" != 'true' ]; then
            {
              echo 'should_check=false'
              echo 'ok=true'
              echo 'state=skipped'
              echo 'summary=E2E check disabled by caller.'
              echo 'details=Caller disabled the E2E gate.'
              echo 'last_status=skipped'
              echo 'last_age_minutes='
              echo 'last_run_url='
              echo 'workflow_path='
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$E2E_IMAGE" ]; then
            {
              echo 'should_check=false'
              echo 'ok=true'
              echo 'state=skipped'
              echo 'summary=E2E image not set; E2E gate skipped.'
              echo 'details=Caller left e2e_image empty.'
              echo 'last_status=skipped'
              echo 'last_age_minutes='
              echo 'last_run_url='
              echo 'workflow_path='
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo 'should_check=true' >> "$GITHUB_OUTPUT"

      - name: Fetch completed post-testing-e2e runs with retry
        if: steps.e2e-precheck.outputs.should_check == 'true'
        uses: projectbluefin/actions/actions/retry@2a09e72e9be15b137392dde15f8587f35587e8eb # main — includes actions/retry (actions#155)
        env:
          E2E_RUNS_PATH: ${{ runner.temp }}/post-testing-e2e-runs.json
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ inputs.head_sha || github.event.pull_request.head.sha }}
          REPO: ${{ inputs.repo }}
        with:
          command: >-
            gh api -H 'Accept: application/vnd.github+json'
            /repos/${REPO}/actions/runs\?head_sha=${HEAD_SHA}\&status=completed\&per_page=100
            > ${E2E_RUNS_PATH}
          max_attempts: '4'
          initial_wait_seconds: '15'
          retry_on: 'rate limit|secondary rate limit|502|503|504|timeout|timed out|connection reset|connection refused|temporary failure|TLS handshake timeout|unexpected EOF'

      - name: Check post-testing-e2e status for PR head SHA
        id: e2e
        shell: bash
        env:
          E2E_RUNS_PATH: ${{ runner.temp }}/post-testing-e2e-runs.json
          E2E_SUITES: ${{ inputs.e2e_suites }}
          PRECHECK_DETAILS: ${{ steps.e2e-precheck.outputs.details }}
          PRECHECK_OK: ${{ steps.e2e-precheck.outputs.ok }}
          PRECHECK_STATE: ${{ steps.e2e-precheck.outputs.state }}
          PRECHECK_SUMMARY: ${{ steps.e2e-precheck.outputs.summary }}
          SHOULD_CHECK: ${{ steps.e2e-precheck.outputs.should_check }}
        run: |
          set -euo pipefail

          if [ "$SHOULD_CHECK" != 'true' ]; then
            {
              echo "ok=${PRECHECK_OK}"
              echo "state=${PRECHECK_STATE}"
              echo "summary=${PRECHECK_SUMMARY}"
              echo "details=${PRECHECK_DETAILS}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          fetch_runs() {
            local query="/repos/${REPO}/actions/runs?per_page=100"
            local err_file="${RUNNER_TEMP}/release-gate-runs.err"
            for attempt in 1 2 3; do
              if gh api -H 'Accept: application/vnd.github+json' "${query}" >"${runs_file}" 2> >(tee "${err_file}" >&2); then
                rm -f "${err_file}"
                return 0
              fi

              if ! grep -qiE "${retry_pattern}" "${err_file}" 2>/dev/null; then
                echo '::error::E2E gate check failed with a non-retryable GitHub API error.'
                rm -f "${err_file}"
                return 1
              fi

              if [ "${attempt}" -eq 3 ]; then
                echo '::error::E2E gate check hit repeated transient GitHub API failures.'
                rm -f "${err_file}"
                return 1
              fi

              echo "::warning::Transient GitHub API failure during E2E gate check (attempt ${attempt}/3). Retrying in 30s..."
              sleep 30
            done
          }

          write_result() {
            local result_json="$1"
            {
              echo "ok=$(jq -r '.ok' <<<"${result_json}")"
              echo "state=$(jq -r '.state' <<<"${result_json}")"
              echo "summary=$(jq -r '.summary' <<<"${result_json}")"
              echo "details=$(jq -r '.details' <<<"${result_json}")"
              echo "last_status=$(jq -r '.last_status' <<<"${result_json}")"
              echo "last_age_minutes=$(jq -r '.last_age_minutes' <<<"${result_json}")"
              echo "last_run_url=$(jq -r '.last_run_url' <<<"${result_json}")"
              echo "workflow_path=$(jq -r '.workflow_path' <<<"${result_json}")"
            } >> "$GITHUB_OUTPUT"
          }

          dispatch_workflow() {
            local workflow_path="$1"
            local dispatch_ref="${GITHUB_REF_NAME:-}"
            if [ -z "${dispatch_ref}" ]; then
              dispatch_ref=$(gh repo view "${REPO}" --json defaultBranchRef --jq '.defaultBranchRef.name')
            fi
            gh workflow run "${workflow_path}" --repo "${REPO}" --ref "${dispatch_ref}"
          }

          for attempt in 1 2 3 4; do
            if ! fetch_runs; then
              result_json=$(jq -cn \
                --arg state "error" \
                --arg summary "GitHub API lookup for E2E runs failed." \
                --arg details "Could not read Actions runs from ${REPO}." \
                '{ok:false,state:$state,summary:$summary,details:$details,last_status:"unknown",last_age_minutes:"",last_run_url:"",workflow_path:"",should_dispatch:false}')
              write_result "${result_json}"
              exit 0
            fi

            result_json=$(python -c '
            import json
            import sys
            from datetime import datetime, timezone

            runs_path, workflows_path, head_sha, suites, stale_after = sys.argv[1:6]
            stale_after = int(stale_after)

            with open(runs_path, encoding="utf-8") as fh:
            runs = json.load(fh)

            try:
            with open(workflows_path, encoding="utf-8") as fh:
            workflows = json.load(fh)
            except FileNotFoundError:
            workflows = {"workflows": []}

            patterns = ("post-testing-e2e", "post-merge-e2e")

            def relevant(item):
            haystacks = [
            (item.get("path") or "").lower(),
            (item.get("name") or "").lower(),
            (item.get("display_title") or "").lower(),
            ]
            return any(pattern in hay for pattern in patterns for hay in haystacks)

            def parse_time(value):
            if not value:
            return None
            return datetime.fromisoformat(value.replace("Z", "+00:00"))

            def age_minutes(value):
            parsed = parse_time(value)
            if parsed is None:
            return ""
            return str(int((datetime.now(timezone.utc) - parsed).total_seconds() // 60))

            workflow_path = ""
            relevant_runs = [run for run in runs.get("workflow_runs", []) if relevant(run)]
            relevant_runs.sort(key=lambda item: item.get("created_at") or "", reverse=True)

            latest_completed = next((run for run in relevant_runs if run.get("status") == "completed"), None)
            latest_active = next((run for run in relevant_runs if run.get("status") != "completed"), None)
            matching_completed = None
            matching_active = None
            if head_sha:
            matching_completed = next((run for run in relevant_runs if run.get("head_sha") == head_sha and run.get("status") == "completed"), None)
            matching_active = next((run for run in relevant_runs if run.get("head_sha") == head_sha and run.get("status") != "completed"), None)

            for candidate in [matching_completed, matching_active, latest_completed, latest_active]:
            if candidate and candidate.get("path"):
            workflow_path = candidate["path"]
            break

            if not workflow_path:
            workflow_candidates = [workflow for workflow in workflows.get("workflows", []) if relevant(workflow)]
            if workflow_candidates:
            workflow_path = workflow_candidates[0].get("path") or ""

            selected = matching_completed or latest_completed
            selected_name = (selected or {}).get("name") or (selected or {}).get("display_title") or "post-testing-e2e"
            selected_url = (selected or {}).get("html_url") or (matching_active or latest_active or {}).get("html_url") or ""
            selected_status = (selected or {}).get("conclusion") or (selected or {}).get("status") or "missing"
            selected_age = age_minutes((selected or {}).get("created_at") or (matching_active or latest_active or {}).get("created_at"))
            stale = not latest_completed or (selected_age and int(selected_age) > stale_after)

            result = {
            "ok": False,
            "state": "stale",
            "summary": f"No recent e2e run found for suites {suites}.",
            "details": "Expected a successful post-testing-e2e or post-merge-e2e run before promotion.",
            "last_status": selected_status,
            "last_age_minutes": selected_age,
            "last_run_url": selected_url,
            "workflow_path": workflow_path,
            "should_dispatch": False,
            }

            if head_sha:
            if matching_completed:
            result["last_status"] = matching_completed.get("conclusion") or "unknown"
            result["last_age_minutes"] = age_minutes(matching_completed.get("created_at"))
            result["last_run_url"] = matching_completed.get("html_url") or ""
            selected_name = matching_completed.get("name") or matching_completed.get("display_title") or selected_name
            if matching_completed.get("conclusion") == "success":
            result.update({
            "ok": True,
            "state": "passed",
            "summary": f"Recent {selected_name} run passed for suites {suites} on this PR head SHA.",
            "details": matching_completed.get("html_url") or "",
            "should_dispatch": False,
            })
            else:
            result.update({
            "ok": False,
            "state": "failed",
            "summary": f"Recent {selected_name} run did not pass for suites {suites} on this PR head SHA.",
            "details": matching_completed.get("html_url") or "",
            "should_dispatch": False,
            })
            elif matching_active:
            result.update({
            "state": "waiting",
            "summary": f"{matching_active.get(\"name\") or matching_active.get(\"display_title\") or \"E2E\"} is still running for this PR head SHA.",
            "details": matching_active.get("html_url") or "",
            "last_status": matching_active.get("status") or "in_progress",
            "last_age_minutes": age_minutes(matching_active.get("created_at")),
            "last_run_url": matching_active.get("html_url") or "",
            "should_dispatch": False,
            })
            elif latest_completed and not stale:
            result.update({
            "state": "waiting",
            "summary": f"No completed e2e run for this PR head SHA yet; latest relevant run is {result[\"last_age_minutes\"]} minute(s) old.",
            "details": latest_completed.get("html_url") or "",
            "should_dispatch": False,
            })
            else:
            age_fragment = f"{result[\"last_age_minutes\"]} minute(s)" if result["last_age_minutes"] else "more than the freshness threshold"
            result.update({
            "state": "stale",
            "summary": f"E2E appears stale for suites {suites}; latest relevant run is {age_fragment} old.",
            "details": result["last_run_url"] or "No relevant completed e2e run found.",
            "should_dispatch": bool(workflow_path),
            })
            else:
            if latest_completed and not stale:
            result["last_status"] = latest_completed.get("conclusion") or "unknown"
            result["last_age_minutes"] = age_minutes(latest_completed.get("created_at"))
            result["last_run_url"] = latest_completed.get("html_url") or ""
            selected_name = latest_completed.get("name") or latest_completed.get("display_title") or selected_name
            if latest_completed.get("conclusion") == "success":
            result.update({
            "ok": True,
            "state": "passed",
            "summary": f"Recent {selected_name} run passed for suites {suites}.",
            "details": latest_completed.get("html_url") or "",
            "should_dispatch": False,
            })
            else:
            result.update({
            "state": "failed",
            "summary": f"Recent {selected_name} run did not pass for suites {suites}.",
            "details": latest_completed.get("html_url") or "",
            "should_dispatch": False,
            })
            elif latest_active:
            result.update({
            "state": "waiting",
            "summary": f"{latest_active.get(\"name\") or latest_active.get(\"display_title\") or \"E2E\"} is still running.",
            "details": latest_active.get("html_url") or "",
            "last_status": latest_active.get("status") or "in_progress",
            "last_age_minutes": age_minutes(latest_active.get("created_at")),
            "last_run_url": latest_active.get("html_url") or "",
            "should_dispatch": False,
            })
            else:
            age_fragment = f"{result[\"last_age_minutes\"]} minute(s)" if result["last_age_minutes"] else "more than the freshness threshold"
            result.update({
            "state": "stale",
            "summary": f"E2E appears stale for suites {suites}; latest relevant run is {age_fragment} old.",
            "details": result["last_run_url"] or "No relevant completed e2e run found.",
            "should_dispatch": bool(workflow_path),
            })

            print(json.dumps(result))
            ' "${runs_file}" "${workflows_file}" "${HEAD_SHA}" "${E2E_SUITES}" "${E2E_STALE_AFTER_MINUTES}")

            state=$(jq -r '.state' <<<"${result_json}")
            if [ "$(jq -r '.ok' <<<"${result_json}")" = 'true' ] || [ "${state}" = 'failed' ] || [ "${state}" = 'error' ]; then
              write_result "${result_json}"
              exit 0
            fi

            if [ "${attempt}" -eq 4 ]; then
              write_result "${result_json}"
              exit 0
            fi

            if [ "$(jq -r '.should_dispatch' <<<"${result_json}")" = 'true' ]; then
              workflow_path=$(jq -r '.workflow_path // empty' <<<"${result_json}")
              if [ -n "${workflow_path}" ]; then
                if dispatch_workflow "${workflow_path}"; then
                  echo "::notice::Re-dispatched ${workflow_path} because the e2e gate looked stale."
                else
                  echo "::warning::Failed to re-dispatch ${workflow_path}; continuing to wait and re-check."
                fi
              fi
            fi

            wait_seconds=${waits[$((attempt - 1))]}
            echo "::warning::$(jq -r '.summary' <<<"${result_json}") Retrying in $((wait_seconds / 60)) minute(s) (attempt $((attempt + 1))/4)..."
            sleep "${wait_seconds}"
          done

      - name: Aggregate gate result
        id: aggregate
        shell: bash
        run: |
          set -euo pipefail
          ready=false
          if [ '${{ steps.resolve.outputs.ok }}' = 'true' ] \
            && [ '${{ steps.verify.outputs.ok }}' = 'true' ] \
            && [ '${{ steps.e2e.outputs.ok }}' = 'true' ]; then
            ready=true
          fi
          echo "ready=${ready}" >> "$GITHUB_OUTPUT"

      - name: Post or update sticky release status comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DIGESTS_JSON: ${{ steps.resolve.outputs.digests }}
          E2E_DETAILS: ${{ steps.e2e.outputs.details }}
          E2E_STATE: ${{ steps.e2e.outputs.state }}
          E2E_SUMMARY: ${{ steps.e2e.outputs.summary }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          READY: ${{ steps.aggregate.outputs.ready }}
          RESOLVE_OK: ${{ steps.resolve.outputs.ok }}
          RESOLVE_SUMMARY: ${{ steps.resolve.outputs.summary }}
          TARGET_TAG: ${{ inputs.target_tag }}
          VARIANTS_JSON: ${{ inputs.variants }}
          VERIFY_OK: ${{ steps.verify.outputs.ok }}
          VERIFY_RESULTS_JSON: ${{ steps.verify.outputs.results }}
          VERIFY_SUMMARY: ${{ steps.verify.outputs.summary }}
        with:
          script: |
            const marker = '<!-- release-status-marker -->';
            const gateStart = '<!-- release-gate-start -->';
            const gateEnd = '<!-- release-gate-end -->';
            const reminderStart = '<!-- release-reminder-start -->';
            const reminderEnd = '<!-- release-reminder-end -->';
            const prNumber = parseInt(process.env.INPUT_PR_NUMBER) || context.payload.pull_request?.number;
            const ready = process.env.READY === 'true';
            const now = new Date().toISOString();
            const digests = JSON.parse(process.env.DIGESTS_JSON || '{}');
            const variants = JSON.parse(process.env.VARIANTS_JSON || '[]');
            const verifyResults = JSON.parse(process.env.VERIFY_RESULTS_JSON || '{}');

            const variantLines = variants.map((variant) => {
              const image = typeof variant === 'string' ? variant : variant.image;
              const digest = digests[image] || 'unresolved';
              const shortDigest = digest.startsWith('sha256:')
                ? `sha256:${digest.slice(7, 23)}`
                : digest.slice(0, 16);
              return `| ${image} | ${process.env.TARGET_TAG} | ${shortDigest} |`;
            }).join('\n');

            const checks = [
              {
                name: 'Resolve digests',
                result: process.env.RESOLVE_OK === 'true' ? 'passed' : 'failed',
                details: process.env.RESOLVE_SUMMARY,
              },
              {
                name: 'Verify cosign signatures',
                result: process.env.VERIFY_OK === 'true' ? 'passed' : 'failed',
                details: process.env.VERIFY_SUMMARY,
              },
              {
                name: `Check post-testing-e2e (${process.env.E2E_STATE || 'unknown'})`,
                result: process.env.E2E_STATE === 'passed'
                  ? 'passed'
                  : process.env.E2E_STATE === 'skipped'
                    ? 'skipped'
                    : 'failed',
                details: process.env.E2E_DETAILS
                  ? `${process.env.E2E_SUMMARY} ${process.env.E2E_DETAILS}`.trim()
                  : process.env.E2E_SUMMARY,
              },
            ];

            const perVariantCheckLines = variants.map((variant) => {
              const image = typeof variant === 'string' ? variant : variant.image;
              const result = verifyResults[image] || 'not-run';
              return `| ${image} | ${result} |`;
            }).join('\n');

            const gateSection = [
              gateStart,
              'Release status',
              '',
              `Status: ${ready ? 'ready' : 'blocked'}`,
              `Last checked (UTC): ${now}`,
              '',
              'Variants',
              '',
              '| Variant | Source tag | Digest |',
              '|---|---|---|',
              variantLines || '| none | none | none |',
              '',
              'Checks',
              '',
              '| Check | Result | Details |',
              '|---|---|---|',
              ...checks.map((check) => `| ${check.name} | ${check.result} | ${String(check.details || '').replace(/\n/g, ' ')} |`),
              '',
              'Per-variant signature results',
              '',
              '| Variant | Signature |',
              '|---|---|',
              perVariantCheckLines || '| none | not-run |',
              gateEnd,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            let reminderSection = `${reminderStart}\n${reminderEnd}`;
            if (existing) {
              const match = existing.body.match(new RegExp(`${reminderStart}[\\s\\S]*?${reminderEnd}`));
              if (match) {
                reminderSection = match[0];
              }
            }

            const body = [marker, gateSection, reminderSection].join('\n\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Set release readiness label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          READY: ${{ steps.aggregate.outputs.ready }}
        with:
          script: |
            const prNumber = parseInt(process.env.INPUT_PR_NUMBER) || context.payload.pull_request?.number;
            const ready = process.env.READY === 'true';
            const desired = ready ? 'release/ready' : 'release/blocked';
            const undesired = ready ? 'release/blocked' : 'release/ready';

            const repoLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const [name, color, description] of [
              [desired, ready ? '0e8a16' : 'b60205', ready ? 'Release gate checks passed' : 'Release gate checks failed'],
              [undesired, ready ? 'b60205' : '0e8a16', ready ? 'Release gate checks failed' : 'Release gate checks passed'],
            ]) {
              if (!repoLabels.some((label) => label.name === name)) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color,
                  description,
                });
              }
            }

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const currentLabels = issue.data.labels.map((label) => typeof label === 'string' ? label : label.name);

            if (!currentLabels.includes(desired)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: [desired],
              });
            }

            if (currentLabels.includes(undesired)) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: undesired,
              }).catch(() => {});
            }

      - name: Close stale blocked promotion issue
        if: ${{ steps.aggregate.outputs.ready == 'true' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          script: |
            const branch = process.env.BRANCH_NAME || context.ref.replace('refs/heads/', '');
            const title = `promotion blocked for >2h on ${branch}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => !issue.pull_request && issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }

      - name: Open or update blocked promotion issue
        if: ${{ steps.aggregate.outputs.ready != 'true' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          E2E_AGE_MINUTES: ${{ steps.e2e.outputs.last_age_minutes }}
          E2E_DETAILS: ${{ steps.e2e.outputs.details }}
          E2E_STATE: ${{ steps.e2e.outputs.state }}
          E2E_STATUS: ${{ steps.e2e.outputs.last_status }}
          E2E_SUMMARY: ${{ steps.e2e.outputs.summary }}
          E2E_URL: ${{ steps.e2e.outputs.last_run_url }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          RESOLVE_OK: ${{ steps.resolve.outputs.ok }}
          VERIFY_OK: ${{ steps.verify.outputs.ok }}
        with:
          script: |
            const branch = process.env.BRANCH_NAME || context.ref.replace('refs/heads/', '');
            const title = `promotion blocked for >2h on ${branch}`;
            const failedChecks = [];
            if (process.env.RESOLVE_OK !== 'true') failedChecks.push('Resolve digests');
            if (process.env.VERIFY_OK !== 'true') failedChecks.push('Verify cosign signatures');
            if (process.env.E2E_STATE && process.env.E2E_STATE !== 'passed' && process.env.E2E_STATE !== 'skipped') {
              failedChecks.push(`Check post-testing-e2e (${process.env.E2E_STATE})`);
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const prNumber = parseInt(process.env.INPUT_PR_NUMBER) || context.payload.pull_request?.number;
            const prUrl = prNumber ? `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/pull/${prNumber}` : 'not available';
            const body = [
              '## Promotion blocked for >2h',
              '',
              `**Branch:** \`${branch}\``,
              `**Failed gate check(s):** ${failedChecks.length ? failedChecks.join(', ') : 'release gate blocked'}`,
              `**Last E2E run status:** ${process.env.E2E_STATUS || 'unknown'}`,
              `**Last E2E run age:** ${process.env.E2E_AGE_MINUTES ? `${process.env.E2E_AGE_MINUTES} minute(s)` : 'unknown'}`,
              `**Last E2E run:** ${process.env.E2E_URL || 'not available'}`,
              `**Gate summary:** ${process.env.E2E_SUMMARY || 'not available'}`,
              `**Gate details:** ${process.env.E2E_DETAILS || 'not available'}`,
              `**Current promote run:** ${runUrl}`,
              `**Promotion PR:** ${prUrl}`,
              '',
              '_Automatically opened by reusable-release-gate.yml after retry exhaustion._',
            ].join('\n');

            const labels = ['area/ci', 'kind/bug', 'priority/p1'];
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => !issue.pull_request && issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
            }

      - name: Fail gate when checks are blocked
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ '${{ steps.aggregate.outputs.ready }}' != 'true' ]; then
            echo '::error::Release gate is blocked after retry/recovery. Review the sticky PR comment and the auto-filed issue for details.'
            exit 1
          fi
