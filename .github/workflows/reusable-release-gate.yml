name: Reusable Release Gate

on:
  workflow_call:
    inputs:
      repo:
        description: Repository name in owner/repo format for concurrency and API calls
        required: true
        type: string
      pr_number:
        description: PR number to post status on (overrides event context; required for workflow_dispatch callers)
        required: false
        default: ''
        type: string
      head_sha:
        description: PR head SHA for e2e lookup (overrides event context; required for workflow_dispatch callers)
        required: false
        default: ''
        type: string
      registry:
        description: GHCR registry prefix
        required: false
        default: ghcr.io/projectbluefin
        type: string
      variants:
        description: JSON array of image variants (objects with "image" key or plain image-name strings)
        required: true
        type: string
      cosign_identity_regexp:
        description: Regular expression for cosign certificate identity verification
        required: true
        type: string
      target_tag:
        description: Source tag to resolve digests from
        required: false
        default: testing
        type: string
      run_e2e:
        description: Whether to require a recent post-testing-e2e result for the PR head SHA
        required: false
        default: true
        type: boolean
      e2e_suites:
        description: Comma-separated suite list for caller documentation and status output
        required: false
        default: smoke,common
        type: string
      e2e_image:
        description: Full image ref associated with the e2e gate; if empty, e2e is skipped
        required: false
        default: ''
        type: string
      e2e_stale_after_minutes:
        description: How old the latest relevant e2e run can be before the gate re-dispatches it
        required: false
        default: 120
        type: number
    outputs:
      ready:
        description: Whether all gate checks passed
        value: ${{ jobs.gate.outputs.ready }}
      digests:
        description: JSON map of resolved image digests
        value: ${{ jobs.gate.outputs.digests }}

permissions: {}

concurrency:
  group: release-gate-${{ inputs.repo }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      issues: write
      packages: read
      pull-requests: write
    outputs:
      ready: ${{ steps.aggregate.outputs.ready }}
      digests: ${{ steps.resolve.outputs.digests }}
    steps:
      - name: Authenticate to GHCR for skopeo reads
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_HOST: ${{ inputs.registry }}
        run: |
          set -euo pipefail
          registry_host="${REGISTRY_HOST:-}"
          registry_host="${registry_host#docker://}"
          registry_host="${registry_host%%/*}"
          echo "$GH_TOKEN" | skopeo login "$registry_host" --username "${{ github.actor }}" --password-stdin

      - name: Resolve digests
        id: resolve
        shell: bash
        env:
          REGISTRY: ${{ inputs.registry }}
          TARGET_TAG: ${{ inputs.target_tag }}
          VARIANTS_JSON: ${{ inputs.variants }}
        run: |
          set -euo pipefail
          digests='{}'
          rows=''
          failed=0
          count=0

          while IFS= read -r variant; do
            [ -n "$variant" ] || continue
            image=$(jq -r 'if type == "string" then . else .image end' <<<"$variant")
            count=$((count + 1))
            ref="${REGISTRY}/${image}:${TARGET_TAG}"

            if digest=$(skopeo inspect --format '{{.Digest}}' "docker://${ref}" 2>/dev/null); then
              digests=$(jq -c --arg image "$image" --arg digest "$digest" '. + {($image): $digest}' <<<"$digests")
              rows+="${image}|${digest}"$'\n'
            else
              failed=1
              rows+="${image}|ERROR"$'\n'
            fi
          done < <(jq -c '.[]' <<<"$VARIANTS_JSON")

          if [ "$failed" -eq 0 ]; then
            ok=true
            summary="Resolved ${count} digest(s) from ${TARGET_TAG}."
          else
            ok=false
            summary="Failed to resolve one or more digests from ${TARGET_TAG}."
          fi

          {
            echo "ok=${ok}"
            echo "summary=${summary}"
            echo "digests=${digests}"
            echo 'rows<<EOF'
            printf '%s' "$rows"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify cosign signatures
        id: verify
        shell: bash
        env:
          DIGESTS_JSON: ${{ steps.resolve.outputs.digests }}
          IDENTITY_REGEXP: ${{ inputs.cosign_identity_regexp }}
          REGISTRY: ${{ inputs.registry }}
          VARIANTS_JSON: ${{ inputs.variants }}
        run: |
          set -euo pipefail
          results='{}'
          rows=''
          failed=0

          if [ '${{ steps.resolve.outputs.ok }}' != 'true' ]; then
            {
              echo 'ok=false'
              echo 'summary=Skipped signature verification because digest resolution failed.'
              echo 'results={}'
              echo 'rows<<EOF'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r variant; do
            [ -n "$variant" ] || continue
            image=$(jq -r 'if type == "string" then . else .image end' <<<"$variant")
            digest=$(jq -r --arg image "$image" '.[$image] // empty' <<<"$DIGESTS_JSON")

            if [ -z "$digest" ]; then
              failed=1
              results=$(jq -c --arg image "$image" '. + {($image): "failed"}' <<<"$results")
              rows+="${image}|failed|digest missing"$'\n'
              continue
            fi

            ref="${REGISTRY}/${image}@${digest}"
            if cosign verify \
              --certificate-identity-regexp "$IDENTITY_REGEXP" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$ref" >/dev/null 2>&1; then
              results=$(jq -c --arg image "$image" '. + {($image): "passed"}' <<<"$results")
              rows+="${image}|passed|signature verified"$'\n'
            else
              failed=1
              results=$(jq -c --arg image "$image" '. + {($image): "failed"}' <<<"$results")
              rows+="${image}|failed|signature verification failed"$'\n'
            fi
          done < <(jq -c '.[]' <<<"$VARIANTS_JSON")

          if [ "$failed" -eq 0 ]; then
            ok=true
            summary='All resolved digests passed cosign verification.'
          else
            ok=false
            summary='One or more digests failed cosign verification.'
          fi

          {
            echo "ok=${ok}"
            echo "summary=${summary}"
            echo "results=${results}"
            echo 'rows<<EOF'
            printf '%s' "$rows"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Determine whether E2E lookup is required
        id: e2e-precheck
        shell: bash
        env:
          E2E_IMAGE: ${{ inputs.e2e_image }}
          RUN_E2E: ${{ inputs.run_e2e }}
        run: |
          set -euo pipefail

          if [ "$RUN_E2E" != 'true' ]; then
            {
              echo 'should_check=false'
              echo 'ok=true'
              echo 'state=skipped'
              echo 'summary=E2E check disabled by caller.'
              echo 'details=Caller disabled the E2E gate.'
              echo 'last_status=skipped'
              echo 'last_age_minutes='
              echo 'last_run_url='
              echo 'workflow_path='
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$E2E_IMAGE" ]; then
            {
              echo 'should_check=false'
              echo 'ok=true'
              echo 'state=skipped'
              echo 'summary=E2E image not set; E2E gate skipped.'
              echo 'details=Caller left e2e_image empty.'
              echo 'last_status=skipped'
              echo 'last_age_minutes='
              echo 'last_run_url='
              echo 'workflow_path='
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo 'should_check=true' >> "$GITHUB_OUTPUT"

      - name: Check post-testing-e2e status for PR head SHA
        id: e2e
        shell: bash
        env:
          E2E_SUITES: ${{ inputs.e2e_suites }}
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ inputs.head_sha || github.event.pull_request.head.sha }}
          REPO: ${{ inputs.repo }}
        run: |
          set -euo pipefail

          if [ '${{ inputs.run_e2e }}' != 'true' ]; then
            {
              echo 'ok=true'
              echo 'state=skipped'
              echo 'summary=E2E check disabled by caller.'
              echo 'details=Caller disabled the E2E gate.'
              echo 'last_status=skipped'
              echo 'last_age_minutes='
              echo 'last_run_url='
              echo 'workflow_path='
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z '${{ inputs.e2e_image }}' ]; then
            {
              echo 'ok=true'
              echo 'state=skipped'
              echo 'summary=E2E image not set; E2E gate skipped.'
              echo 'details=Caller left e2e_image empty.'
              echo 'last_status=skipped'
              echo 'last_age_minutes='
              echo 'last_run_url='
              echo 'workflow_path='
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          runs=$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${REPO}/actions/runs?head_sha=${HEAD_SHA}&status=completed&per_page=100")

          selected=$(jq -c '
            [
              .workflow_runs[]
              | select(
                  ((.path // "") | endswith("post-testing-e2e.yml"))
                  or ((.path // "") | endswith("post-merge-e2e.yml"))
                  or (((.name // "") | ascii_downcase) | contains("post-testing-e2e"))
                  or (((.name // "") | ascii_downcase) | contains("post-merge e2e"))
                )
            ]
            | sort_by(.created_at)
            | reverse
            | .[0] // empty
          ' <<<"$runs")

          if [ -z "$selected" ]; then
            {
              echo 'ok=false'
              echo 'state=failed'
              echo "summary=No completed post-testing-e2e run found for suites ${E2E_SUITES} on this PR head SHA."
              echo 'details=Expected a successful post-testing-e2e run for the promotion commit.'
              echo 'last_status=missing'
              echo 'last_age_minutes='
              echo 'last_run_url='
              echo 'workflow_path=.github/workflows/post-testing-e2e.yml'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          conclusion=$(jq -r '.conclusion // "unknown"' <<<"$selected")
          run_url=$(jq -r '.html_url // empty' <<<"$selected")
          run_name=$(jq -r '.name // .display_title // "post-testing-e2e"' <<<"$selected")
          run_path=$(jq -r '.path // ".github/workflows/post-testing-e2e.yml"' <<<"$selected")
          created_at=$(jq -r '.created_at // empty' <<<"$selected")
          age_minutes=""
          if [ -n "$created_at" ]; then
            age_minutes=$(( ( $(date -u +%s) - $(date -d "$created_at" +%s) ) / 60 ))
          fi

          if [ "$conclusion" = 'success' ]; then
            {
              echo 'ok=true'
              echo 'state=passed'
              echo "summary=Recent ${run_name} run passed for suites ${E2E_SUITES} on this PR head SHA."
              echo "details=${run_url}"
              echo "last_status=success"
              echo "last_age_minutes=${age_minutes}"
              echo "last_run_url=${run_url}"
              echo "workflow_path=${run_path}"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'ok=false'
              echo 'state=failed'
              echo "summary=Recent ${run_name} run did not pass for suites ${E2E_SUITES} on this PR head SHA."
              echo "details=${run_url}"
              echo "last_status=${conclusion}"
              echo "last_age_minutes=${age_minutes}"
              echo "last_run_url=${run_url}"
              echo "workflow_path=${run_path}"
            } >> "$GITHUB_OUTPUT"
          fi


      - name: Aggregate gate result
        id: aggregate
        shell: bash
        run: |
          set -euo pipefail
          ready=false
          if [ '${{ steps.resolve.outputs.ok }}' = 'true' ] \
            && [ '${{ steps.verify.outputs.ok }}' = 'true' ] \
            && [ '${{ steps.e2e.outputs.ok }}' = 'true' ]; then
            ready=true
          fi
          echo "ready=${ready}" >> "$GITHUB_OUTPUT"

      - name: Update PR body gate section
        if: inputs.pr_number != ''
        uses: projectbluefin/actions/.github/actions/render-gate-section@b2481faee5bad2f2a25b64d6269b06399a2f44c0 # v1
        with:
          gh_token:        ${{ github.token }}
          repo:            ${{ inputs.repo }}
          pr_number:       ${{ inputs.pr_number }}
          resolve_ok:      ${{ steps.resolve.outputs.ok }}
          resolve_summary: ${{ steps.resolve.outputs.summary }}
          verify_ok:       ${{ steps.verify.outputs.ok }}
          verify_summary:  ${{ steps.verify.outputs.summary }}
          e2e_state:       ${{ steps.e2e.outputs.state }}
          e2e_summary:     ${{ steps.e2e.outputs.summary }}
          e2e_details:     ${{ steps.e2e.outputs.details }}
          ready:           ${{ steps.aggregate.outputs.ready }}

      - name: Set release readiness label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          READY: ${{ steps.aggregate.outputs.ready }}
        with:
          script: |
            const prNumber = parseInt(process.env.INPUT_PR_NUMBER) || context.payload.pull_request?.number;
            const ready = process.env.READY === 'true';
            const desired = ready ? 'release/ready' : 'release/blocked';
            const undesired = ready ? 'release/blocked' : 'release/ready';

            const repoLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const [name, color, description] of [
              [desired, ready ? '0e8a16' : 'b60205', ready ? 'Release gate checks passed' : 'Release gate checks failed'],
              [undesired, ready ? 'b60205' : '0e8a16', ready ? 'Release gate checks failed' : 'Release gate checks passed'],
            ]) {
              if (!repoLabels.some((label) => label.name === name)) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color,
                  description,
                });
              }
            }

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const currentLabels = issue.data.labels.map((label) => typeof label === 'string' ? label : label.name);

            if (!currentLabels.includes(desired)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: [desired],
              });
            }

            if (currentLabels.includes(undesired)) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: undesired,
              }).catch(() => {});
            }

      - name: Fail gate when checks are blocked
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ '${{ steps.aggregate.outputs.ready }}' != 'true' ]; then
            echo '::error::Release gate is blocked after retry/recovery. Review the sticky PR comment and the auto-filed issue for details.'
            exit 1
          fi
