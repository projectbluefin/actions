name: Reusable Release Reminder

on:
  workflow_call:
    inputs:
      days_warn:
        description: Post a reminder after this many days without a release
        required: false
        default: 7
        type: number
      days_escalate:
        description: Escalate reminder after this many days without a release
        required: false
        default: 14
        type: number

permissions: {}

jobs:
  reminder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Update sticky reminder comment when release is overdue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DAYS_ESCALATE: ${{ inputs.days_escalate }}
          DAYS_WARN: ${{ inputs.days_warn }}
        with:
          script: |
            const marker = '<!-- release-status-marker -->';
            const gateStart = '<!-- release-gate-start -->';
            const gateEnd = '<!-- release-gate-end -->';
            const reminderStart = '<!-- release-reminder-start -->';
            const reminderEnd = '<!-- release-reminder-end -->';
            const daysWarn = Number(process.env.DAYS_WARN || '7');
            const daysEscalate = Number(process.env.DAYS_ESCALATE || '14');

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 10,
            });
            const latestRelease = releases[0];
            const lastPublishedAt = latestRelease?.published_at || latestRelease?.created_at;
            const daysSince = lastPublishedAt
              ? Math.floor((Date.now() - new Date(lastPublishedAt).getTime()) / 86400000)
              : 99999;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
              head: `${context.repo.owner}:auto/promote-testing-to-main`,
              per_page: 100,
            });
            const pr = pulls[0];

            if (!pr) {
              core.info('No open auto/promote-testing-to-main PR found.');
              return;
            }

            if (daysSince < daysWarn) {
              core.info(`Only ${daysSince} day(s) since the last release. No reminder needed.`);
              return;
            }

            const reminderText = daysSince >= daysEscalate
              ? `Days since last release: ${daysSince}. This PR has been open for over two weeks without a stable release.`
              : `Days since last release: ${daysSince}. This PR is ready for maintainer review.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            let gateSection = `${gateStart}\n${gateEnd}`;
            if (existing) {
              const gateMatch = existing.body.match(new RegExp(`${gateStart}[\\s\\S]*?${gateEnd}`));
              if (gateMatch) {
                gateSection = gateMatch[0];
              }
            }

            const reminderSection = [
              reminderStart,
              'Reminder',
              '',
              reminderText,
              reminderEnd,
            ].join('\n');

            const body = [marker, gateSection, reminderSection].join('\n\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
