name: actionlint

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'bootc-build/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'bootc-build/**'

jobs:
  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-pr-check
          fail_on_error: true
          # https://github.blog/changelog/2023-02-09-github-actions-update-on-code-and-workflow-permissions/
