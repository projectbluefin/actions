name: actionlint

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'bootc-build/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'bootc-build/**'

jobs:
  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run actionlint
        uses: reviewdog/action-actionlint@50842263c20a7c46bd0065b9e624d3c569db061e # v1.73.0
        with:
          reporter: github-pr-check
          fail_on_error: true
          # https://github.blog/changelog/2023-02-09-github-actions-update-on-code-and-workflow-permissions/
