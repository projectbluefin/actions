name: actionlint

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'bootc-build/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'bootc-build/**'

jobs:
  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-pr-check
          fail_on_error: true
          # 'workflows' is a valid GITHUB_TOKEN scope (added Feb 2023, needed to push
          # commits touching .github/workflows/). actionlint's built-in permission list
          # predates this addition. Suppress the false-positive until actionlint is updated.
          # https://github.blog/changelog/2023-02-09-github-actions-update-on-code-and-workflow-permissions/
          actionlint_flags: -ignore 'unknown permission scope "workflows"'
