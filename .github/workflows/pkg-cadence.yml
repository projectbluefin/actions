name: Update package cadence intervals

# Factory caller — runs reusable-pkg-cadence for all projectbluefin RPM images.
# See .github/workflows/reusable-pkg-cadence.yml for full documentation and
# the consumer adoption pattern for out-of-factory repos.

on:
  schedule:
    # Sunday 06:00 UTC — after weekly stable builds ship (~Saturday)
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      force_reclassify:
        description: 'Recompute all intervals from churn data ignoring bootstrap heuristics'
        type: boolean
        default: false

permissions: {}

jobs:
  bluefin:
    uses: ./.github/workflows/reusable-pkg-cadence.yml
    with:
      image: ghcr.io/projectbluefin/bluefin:stable
      repo: projectbluefin/bluefin
      force_reclassify: ${{ inputs.force_reclassify || false }}
    secrets: inherit

  bluefin-lts:
    uses: ./.github/workflows/reusable-pkg-cadence.yml
    with:
      image: ghcr.io/projectbluefin/bluefin:lts
      repo: projectbluefin/bluefin-lts
      force_reclassify: ${{ inputs.force_reclassify || false }}
    secrets: inherit
