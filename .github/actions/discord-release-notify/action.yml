name: Discord Release Notify
description: Posts a release card to a Discord forum webhook channel. No-ops if webhook_url is empty.

inputs:
  webhook_url:
    description: Discord releases channel webhook URL (from secret). No-op if empty.
    required: false
    default: ''
  tag_name:
    description: Release tag (e.g. v20250624.0)
    required: true
  repo:
    description: Repository name (e.g. projectbluefin/bluefin)
    required: true

runs:
  using: composite
  steps:
    - name: Post release card to Discord
      shell: bash
      env:
        WEBHOOK_URL: ${{ inputs.webhook_url }}
        TAG_NAME: ${{ inputs.tag_name }}
        REPO: ${{ inputs.repo }}
        VARIANTS_JSON: ${{ inputs.variants_json }}
        DIGESTS_JSON: ${{ inputs.digests_json }}
      run: |
        [ -n "$WEBHOOK_URL" ] || { echo "No Discord webhook URL configured, skipping."; exit 0; }

        repo_short="${REPO##*/}"

        card_file="/tmp/release-card-dark.png"

        # Derive mascot avatar + display name from repo name
        # Mapping mirrors generate-card-images.mjs in projectbluefin/documentation
        DOCS_RAW="https://raw.githubusercontent.com/projectbluefin/documentation/main/static/img"
        case "${REPO}" in
          */bluefin-lts) bot_name="Bluefin LTS"; avatar_url="${DOCS_RAW}/bluefin-lts-release-bot.svg"; card_slug="bluefin-lts" ;;
          */dakota)      bot_name="Dakota";       avatar_url="${DOCS_RAW}/characters/dakotaraptor.png"; card_slug="dakota" ;;
          *)             bot_name="Bluefin";      avatar_url="${DOCS_RAW}/bluefin-release-bot.png";     card_slug="bluefin" ;;
        esac

        # Pretty date from tag — stable-20260623 → "June 23, 2026"
        date_raw="${TAG_NAME##*-}"
        pretty_date=$(date -d "${date_raw:0:4}-${date_raw:4:2}-${date_raw:6:2}" "+%B %-d, %Y" 2>/dev/null || echo "$TAG_NAME")
        post_title="${bot_name} — ${pretty_date}"

        # Fetch the rich release card from the docs site — always reflects current release,
        # includes kernel version, package counts, and raptor mascot artwork.
        # Generated by projectbluefin/documentation scripts/generate-card-images.mjs
        card_file="/tmp/release-card-dark.png"
        curl -sfL "https://docs.projectbluefin.io/img/cards/${card_slug}-dark.png" -o "${card_file}"

        # Post PNG as plain file attachment — Discord renders it full-width, no embed shrinkage
        payload=$(jq -n \
          --arg thread_name "$post_title" \
          --arg bot_name "$bot_name" \
          --arg avatar_url "$avatar_url" \
          '{
            "username": $bot_name,
            "avatar_url": $avatar_url,
            "thread_name": $thread_name,
            "allowed_mentions": {"parse": []}
          }')

        response=$(curl -sf -w "\n%{http_code}" \
          -H "User-Agent: DiscordBot (https://github.com/projectbluefin/common, 1.0)" \
          -F "payload_json=${payload}" \
          -F "files[0]=@${card_file};type=image/png" \
          "${WEBHOOK_URL}")

        http_status=$(tail -1 <<< "$response")

        [[ "$http_status" == "200" ]] || {
          echo "Discord post failed: HTTP $http_status" >&2
          exit 1
        }
