name: Discord Release Notify
description: Posts a release card to a Discord forum webhook channel. No-ops if webhook_url is empty.

inputs:
  webhook_url:
    description: Discord releases channel webhook URL (from secret). No-op if empty.
    required: false
    default: ''
  tag_name:
    description: Release tag (e.g. v20250624.0)
    required: true
  repo:
    description: Repository name (e.g. projectbluefin/bluefin)
    required: true

runs:
  using: composite
  steps:
    - name: Post release card to Discord
      shell: bash
      env:
        WEBHOOK_URL: ${{ inputs.webhook_url }}
        TAG_NAME: ${{ inputs.tag_name }}
        REPO: ${{ inputs.repo }}
        VARIANTS_JSON: ${{ inputs.variants_json }}
        DIGESTS_JSON: ${{ inputs.digests_json }}
      run: |
        [ -n "$WEBHOOK_URL" ] || { echo "No Discord webhook URL configured, skipping."; exit 0; }

        repo_short="${REPO##*/}"
        release_url="https://github.com/${REPO}/releases/tag/${TAG_NAME}"
        card_file="/tmp/release-card-dark.png"

        # Download release card asset — hosted by Discord, no GitHub CDN dependency
        gh release download "${TAG_NAME}" \
          --repo "${REPO}" \
          --pattern "release-card-dark.png" \
          --dir /tmp \
          --clobber

        # payload_json: forum thread opener, image references the uploaded attachment
        # thread_name creates the forum post title
        # allowed_mentions: parse=[] prevents @everyone injection
        payload=$(jq -n \
          --arg thread_name "${repo_short} ${TAG_NAME}" \
          --arg title "${repo_short} ${TAG_NAME}" \
          --arg url "$release_url" \
          '{
            "thread_name": $thread_name,
            "allowed_mentions": {"parse": []},
            "embeds": [{
              "title": $title,
              "url": $url,
              "color": 3066993,
              "image": {"url": "attachment://release-card-dark.png"}
            }]
          }')

        response=$(curl -sf -w "\n%{http_code}" \
          -F "payload_json=${payload}" \
          -F "files[0]=@${card_file};type=image/png" \
          "${WEBHOOK_URL}")

        http_status=$(tail -1 <<< "$response")

        [[ "$http_status" == "200" ]] || {
          echo "Discord post failed: HTTP $http_status" >&2
          exit 1
        }
