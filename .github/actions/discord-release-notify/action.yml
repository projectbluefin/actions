name: Discord Release Notify
description: Posts a release card to a Discord forum webhook channel. No-ops if webhook_url is empty.

inputs:
  webhook_url:
    description: Discord releases channel webhook URL (from secret). No-op if empty.
    required: false
    default: ''
  tag_name:
    description: Release tag (e.g. v20250624.0)
    required: true
  repo:
    description: Repository name (e.g. projectbluefin/bluefin)
    required: true
  variants_json:
    description: JSON array of {image, source_tag, target_tag} objects
    required: true
  digests_json:
    description: JSON map of {image -> digest} from resolve step
    required: true

runs:
  using: composite
  steps:
    - name: Post release card to Discord
      shell: bash
      env:
        WEBHOOK_URL: ${{ inputs.webhook_url }}
        TAG_NAME: ${{ inputs.tag_name }}
        REPO: ${{ inputs.repo }}
        VARIANTS_JSON: ${{ inputs.variants_json }}
        DIGESTS_JSON: ${{ inputs.digests_json }}
      run: |
        [ -n "$WEBHOOK_URL" ] || { echo "No Discord webhook URL configured, skipping."; exit 0; }

        repo_short="${REPO##*/}"
        release_url="https://github.com/${REPO}/releases/tag/${TAG_NAME}"
        card_url="https://github.com/${REPO}/releases/download/${TAG_NAME}/release-card-dark.png"

        # Build embed fields — one per promoted variant with short digest
        fields=$(jq -cn \
          --argjson variants "$VARIANTS_JSON" \
          --argjson digests "$DIGESTS_JSON" \
          '$variants | map({
            "name": "\(.image):\(.target_tag)",
            "value": ("`" + ($digests[.image] // "unknown")[0:19] + "...`"),
            "inline": true
          })')

        # Single post — forum thread opener with release card image embedded full-width
        # thread_name sets the Forum post title
        # allowed_mentions: parse=[] prevents @everyone injection
        opener=$(jq -n \
          --arg thread_name "${repo_short} ${TAG_NAME}" \
          --arg title "${repo_short} ${TAG_NAME}" \
          --arg url "$release_url" \
          --arg card "$card_url" \
          --argjson fields "$fields" \
          '{
            "thread_name": $thread_name,
            "allowed_mentions": {"parse": []},
            "embeds": [{
              "title": $title,
              "url": $url,
              "color": 3066993,
              "fields": $fields,
              "image": {"url": $card},
              "timestamp": (now | todate)
            }]
          }')

        response=$(curl -sf -w "\n%{http_code}" \
          -H "Content-Type: application/json" \
          -d "$opener" \
          "${WEBHOOK_URL}?wait=true")

        http_status=$(tail -1 <<< "$response")

        [[ "$http_status" == "200" ]] || {
          echo "Discord post failed: HTTP $http_status" >&2
          exit 1
        }
