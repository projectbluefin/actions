# Retry with exponential backoff — composite action
#
# Usage in any workflow:
#   - name: Push with retry
#     uses: projectbluefin/actions/actions/retry@<sha>
#     with:
#       command: buildah push "$IMAGE" "docker://$REGISTRY/$IMAGE:$TAG"
#       max_attempts: 3
#       initial_wait_seconds: 10
#       retry_on: "rate limit|timeout|429|503|connection reset"

name: Retry with Backoff
description: |
  Retries a shell command with exponential backoff. Optionally filters
  retries to only trigger on specific error patterns (rate limits, timeouts).

inputs:
  command:
    description: 'Shell command to execute'
    required: true
  max_attempts:
    description: 'Maximum number of attempts (1 = no retry)'
    required: false
    default: '3'
  initial_wait_seconds:
    description: 'Initial wait between retries (doubles each attempt)'
    required: false
    default: '10'
  retry_on:
    description: 'Regex pattern — only retry if stderr matches this (empty = always retry)'
    required: false
    default: ''
  working_directory:
    description: 'Working directory for command execution'
    required: false
    default: '.'

outputs:
  attempts:
    description: 'Number of attempts made'
    value: ${{ steps.retry.outputs.attempts }}
  success:
    description: 'Whether the command eventually succeeded (true/false)'
    value: ${{ steps.retry.outputs.success }}

runs:
  using: composite
  steps:
    - name: Execute with retry
      id: retry
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        RETRY_COMMAND: ${{ inputs.command }}
        MAX_ATTEMPTS: ${{ inputs.max_attempts }}
        INITIAL_WAIT_SECONDS: ${{ inputs.initial_wait_seconds }}
        RETRY_ON: ${{ inputs.retry_on }}
      run: bash "${{ github.action_path }}/retry.sh"
