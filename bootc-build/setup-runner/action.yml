name: "bootc-build/setup-runner"
description: "Prepare a GitHub Actions runner for bootc image building"
author: "projectbluefin"

inputs:
  storage-backend:
    description: "Storage backend: 'btrfs' (remove-software + BTRFS loopback for /var/lib/containers) or 'remove-software' (remove-software only)"
    default: "btrfs"
  update-podman:
    description: "Install podman/buildah/crun/skopeo from Ubuntu resolute (25.04)"
    default: "true"
  install-tools:
    description: "JSON array of tools to install: e.g. '[\"just\", \"cosign\", \"oras\", \"syft\"]'"
    default: "[]"

outputs:
  podman-version:
    description: "Installed podman version string"
    value: ${{ steps.podman-version.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Maximize build space (remove-software)
      if: inputs.storage-backend == 'btrfs' || inputs.storage-backend == 'remove-software'
      uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v10
      with:
        extra-squeeze: "true"

    - name: Mount BTRFS for podman storage
      if: inputs.storage-backend == 'btrfs'
      uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6 # no-release, Merge PR #18 (2026-02)
      with:
        target-dir: /var/lib/containers
        mount-opts: compress-force=zstd:2
        loopback-free: "1"

    - name: Add Ubuntu resolute apt source
      if: inputs.update-podman == 'true'
      shell: bash
      run: |
        set -eux
        # TODO: remove when Ubuntu 26.04 runners ship a new-enough podman
        # Old podman (Ubuntu 24.04) does not push layer annotations (ostree.components)
        # needed by the rpm-ostree rechunker and does not support zstd:chunked push.
        IDV=$(. /usr/lib/os-release && echo ${ID}-${VERSION_ID})
        test "${IDV}" = "ubuntu-24.04"
        if [ "$(dpkg --print-architecture)" = "amd64" ]; then
          mirror="http://azure.archive.ubuntu.com/ubuntu"
        else
          mirror="http://ports.ubuntu.com/ubuntu-ports"
        fi
        echo "deb ${mirror} resolute universe main" | sudo tee /etc/apt/sources.list.d/resolute.list

    - name: Compute apt cache key (weekly rotation)
      if: inputs.update-podman == 'true'
      id: apt-cache-key
      shell: bash
      run: echo "week=$(date +%Y-W%V)" >> "$GITHUB_OUTPUT"

    - name: Restore apt package cache
      if: inputs.update-podman == 'true'
      id: apt-cache-restore
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: /var/cache/apt/archives
        key: apt-resolute-podman-${{ runner.os }}-${{ runner.arch }}-${{ steps.apt-cache-key.outputs.week }}
        restore-keys: |
          apt-resolute-podman-${{ runner.os }}-${{ runner.arch }}-

    - name: Install podman stack from Ubuntu resolute
      if: inputs.update-podman == 'true'
      shell: bash
      run: |
        set -eux
        # Suppress needrestart's automatic service restarts during apt install.
        # When libgpg-error0 upgrades noble→resolute, needrestart tries to restart
        # rsyslog. The restart fails with a core dump; the runner then loses log
        # connectivity ~20 minutes later and gets killed mid-build.
        # Leaving the running rsyslog in place (with the old library in memory via
        # mmap) is safe — it keeps functioning until the job ends.
        sudo mkdir -p /etc/needrestart/conf.d
        echo '$nrconf{restart} = "l";' | sudo tee /etc/needrestart/conf.d/99-no-restarts.conf
        /bin/time -f '%E %C' sudo apt update
        /bin/time -f '%E %C' sudo apt install -y --allow-downgrades crun/resolute buildah/resolute podman/resolute skopeo/resolute
        sudo rm -f /etc/needrestart/conf.d/99-no-restarts.conf

    - name: Save apt package cache
      if: inputs.update-podman == 'true' && steps.apt-cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: /var/cache/apt/archives
        key: ${{ steps.apt-cache-restore.outputs.cache-primary-key }}

    - name: Install just
      if: contains(fromJSON(inputs.install-tools), 'just')
      uses: taiki-e/install-action@f4f7c6f1cc934d4ea1ecdd859ece8eef80a7d6ea # just
      with:
        tool: just

    - name: Install cosign
      if: contains(fromJSON(inputs.install-tools), 'cosign')
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Install ORAS
      if: contains(fromJSON(inputs.install-tools), 'oras')
      uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

    - name: Install Syft
      if: contains(fromJSON(inputs.install-tools), 'syft')
      uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      with:
        syft-version: v1.44.0

    - name: Get podman version
      id: podman-version
      shell: bash
      run: |
        set -euo pipefail
        VERSION=$(podman --version 2>/dev/null | awk '{print $3}' || echo "unknown")
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
