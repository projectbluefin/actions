name: "bootc-build/chunka"
description: "Rechunk a bootc image using chunkah (OCI-native, no rpm-ostree)"
author: "projectbluefin"

inputs:
  source-image:
    description: "Local image reference to rechunk — must be in rootful container storage (e.g. localhost/my-image:latest)"
    required: true
  output-image:
    description: "Output image tag; defaults to source-image (in-place rechunk)"
    default: ""
  max-layers:
    description: "Maximum number of OCI layers"
    default: "128"
  force-compression:
    description: "Force recompression via buildah (optional; default preserves existing compression; ignored in BST mode)"
    default: "false"
  xattr-manifest:
    description: >
      Path to a fakecap TSV manifest (path<TAB>component<TAB>interval) for BST/BuildStream images.
      When set, the action uses the BST code path: mounts a writable overlay, injects
      user.component xattrs from the manifest, then runs chunkah via podman run.
      The buildah/Containerfile.splitter path is skipped entirely.
      Required for images built with BuildStream because BST strips xattrs on OCI export;
      without physical xattrs chunkah detects 0 components.
      Produce the manifest with scripts/gen-filemap.py (outputs files/fakecap-manifest.tsv).
      See coreos/chunkah#113 (closed; physical xattr injection is the confirmed resolution).
    default: ""

outputs:
  image-ref:
    description: "Reference to rechunked image in user (podman) storage"
    value: ${{ steps.chunka.outputs.image-ref }}

runs:
  using: "composite"
  steps:
    - name: Rechunk with chunkah
      id: chunka
      shell: bash
      env:
        SOURCE: ${{ inputs.source-image }}
        OUTPUT: ${{ inputs.output-image }}
        MAX_LAYERS: ${{ inputs.max-layers }}
        FORCE_COMPRESSION: ${{ inputs.force-compression }}
        XATTR_MANIFEST: ${{ inputs.xattr-manifest }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail

        # Version pin — bump CHUNKAH_VERSION, CHUNKAH_SHA, and bootc-build/chunka/Containerfile.splitter
        # together in the same commit. The vendored Containerfile.splitter was fetched from the release
        # at CHUNKAH_VERSION and verified: sha256:46f328cf9098370ab1634748e84949b994416cbb36931126c794018484361279
        # Do NOT fetch Containerfile.splitter from the network at build time — see docs/skills/supply-chain.md.
        CHUNKAH_VERSION="v0.6.0"
        CHUNKAH_SHA="sha256:ff8b8b466a942ec6000445d4001fc661e2fc5a952ad9ee29b4de9ab09d1d1708"
        CHUNKAH_REF="quay.io/coreos/chunkah:${CHUNKAH_VERSION}@${CHUNKAH_SHA}"
        CONTAINERFILE="${ACTION_PATH}/Containerfile.splitter"

        OUTPUT_TAG="${OUTPUT:-${SOURCE}}"

        # CHUNKAH_CONFIG_STR passes existing OCI labels (containers.bootc=1, etc.)
        # into chunkah so they are preserved on the rechunked image.
        CHUNKAH_CONFIG_STR="$(sudo podman inspect "${SOURCE}")"

        if [[ -n "${XATTR_MANIFEST}" ]]; then
          # ── BST path ────────────────────────────────────────────────────────────
          # BuildStream strips xattrs on OCI export, so chunkah detects 0 components
          # without intervention. Workaround: mount a writable overlay, physically
          # set user.component xattrs from the pre-built fakecap manifest, then run
          # chunkah against the overlay. coreos/chunkah#113 (closed) confirmed this
          # is the accepted resolution — no libc fallback will land in chunkah.

          # Pull chunkah with retries (transient registry 5xx errors are common).
          for attempt in 1 2 3; do
            sudo podman pull "${CHUNKAH_REF}" && break
            echo "==> chunkah pull attempt ${attempt} failed, retrying in 10s..."
            [[ "${attempt}" -lt 3 ]] && sleep 10
          done

          LOWER=$(sudo podman image mount "${SOURCE}")

          # Pick the tmpdir with the most free space for the overlay work dirs.
          # inject-xattrs.py triggers overlayfs copy-up for every file it touches
          # (700K+ entries on BST images), which can easily exhaust /var/tmp on
          # runners where setup-runner's BTRFS loopback leaves only ~1 GB on root.
          # /var/lib/containers is the BTRFS volume (~49 GB) on those runners.
          _OVERLAY_TMPDIR="/var/tmp"
          for _candidate in /var/lib/containers /var/tmp; do
            if [[ -d "$_candidate" ]]; then
              _free=$(df --output=avail "$_candidate" 2>/dev/null | tail -1 || echo 0)
              _best=$(df --output=avail "$_OVERLAY_TMPDIR" 2>/dev/null | tail -1 || echo 0)
              if (( _free > _best )); then _OVERLAY_TMPDIR="$_candidate"; fi
            fi
          done
          echo "==> overlay tmpdir: ${_OVERLAY_TMPDIR} ($(df -h --output=avail "${_OVERLAY_TMPDIR}" | tail -1 | tr -d ' ') free)"

          # _OVERLAY_TMPDIR is often /var/lib/containers (the BTRFS volume mounted
          # by setup-runner, root-owned). Use sudo mktemp so creation succeeds;
          # sudo chmod 755 follows so the overlay mount can access the dirs.
          UPPER=$(sudo mktemp -d -p "$_OVERLAY_TMPDIR")
          WORK=$(sudo mktemp -d -p "$_OVERLAY_TMPDIR")
          MERGED=$(sudo mktemp -d -p "$_OVERLAY_TMPDIR")
          sudo chmod 755 "$UPPER" "$WORK" "$MERGED"

          cleanup_bst() {
            sudo umount "$MERGED" 2>/dev/null || true
            sudo rm -rf "$UPPER" "$WORK" "$MERGED"
            sudo podman image umount "${SOURCE}" >/dev/null 2>&1 || true
          }
          trap cleanup_bst EXIT

          sudo mount -t overlay overlay \
            -o "lowerdir=${LOWER},upperdir=${UPPER},workdir=${WORK}" \
            "$MERGED"

          echo "==> Injecting user.component xattrs from ${XATTR_MANIFEST}..."
          sudo python3 "${ACTION_PATH}/inject-xattrs.py" "${XATTR_MANIFEST}" "$MERGED"

          echo "==> Running chunkah against overlay..."
          LOADED=$(sudo podman run --rm \
            --pull never \
            --security-opt label=type:unconfined_t \
            -v "${MERGED}:/chunkah:ro" \
            -e "CHUNKAH_ROOTFS=/chunkah" \
            -e "CHUNKAH_CONFIG_STR=${CHUNKAH_CONFIG_STR}" \
            "${CHUNKAH_REF}" build \
              --max-layers "${MAX_LAYERS}" \
              --prune /sysroot/ \
              --label ostree.commit- \
              --label ostree.final-diffid- \
            | sudo podman load)

          NEW_REF=$(echo "$LOADED" | sed -n 's/^Loaded image(s): //p; s/^Loaded image: //p' | head -1)
          if [[ -z "$NEW_REF" ]]; then
            NEW_REF=$(echo "$LOADED" | grep -oP '^[0-9a-f]{64}$' | head -1 || true)
          fi
          if [[ -n "$NEW_REF" && "$NEW_REF" != "${OUTPUT_TAG}" ]]; then
            sudo podman tag "$NEW_REF" "${OUTPUT_TAG}"
          fi

        else
          # ── RPM / buildah path ──────────────────────────────────────────────────
          # For RPM-based bootc images: chunkah reads the rpmdb for component
          # detection. buildah executes the vendored Containerfile.splitter which
          # mounts the source image and runs chunkah inside the build context.

          FC_FLAG=""
          if [[ "${FORCE_COMPRESSION}" == "true" ]]; then
            FC_FLAG="--force-compression"
          fi

          # -v and --security-opt are required for buildah < v1.44 (Ubuntu 24.04 ships 1.33.x).
          # The bind-mount of /run/src keeps the OCI output dir in the host CWD so that the
          # final `FROM oci:out` stage in Containerfile.splitter can find it.
          sudo buildah build \
            --skip-unused-stages=false \
            --from "${SOURCE}" \
            --build-arg "CHUNKAH=${CHUNKAH_REF}" \
            --build-arg "CHUNKAH_CONFIG_STR=${CHUNKAH_CONFIG_STR}" \
            --build-arg "CHUNKAH_ARGS=--max-layers ${MAX_LAYERS} --prune /sysroot/ --label ostree.commit- --label ostree.final-diffid-" \
            -t "${OUTPUT_TAG}" \
            -v "$(pwd):/run/src" \
            --security-opt=label=disable \
            ${FC_FLAG:+${FC_FLAG}} \
            "${CONTAINERFILE}"

          sudo rm -rf out
        fi

        # Transfer rechunked image from root (buildah/podman) storage to user (podman) storage.
        # Both paths leave the tagged image in root's container store; this step makes it
        # visible to unprivileged podman steps that follow (e.g. push-image, sign-and-publish).
        sudo podman save "${OUTPUT_TAG}" | podman load

        echo "image-ref=${OUTPUT_TAG}" >> "$GITHUB_OUTPUT"
