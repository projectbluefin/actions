name: "bootc-build/chunka"
description: "Rechunk a bootc image using chunkah (OCI-native, no rpm-ostree)"
author: "projectbluefin"

inputs:
  source-image:
    description: "Local image reference to rechunk — must be in rootful container storage (e.g. localhost/my-image:latest)"
    required: true
  output-image:
    description: "Output image tag; defaults to source-image (in-place rechunk)"
    default: ""
  max-layers:
    description: "Maximum number of OCI layers"
    default: "128"
  force-compression:
    description: "Force recompression via buildah (optional; default preserves existing compression)"
    default: "false"

outputs:
  image-ref:
    description: "Reference to rechunked image in user (podman) storage"
    value: ${{ steps.chunka.outputs.image-ref }}

runs:
  using: "composite"
  steps:
    - name: Rechunk with chunkah
      id: chunka
      shell: bash
      env:
        SOURCE: ${{ inputs.source-image }}
        OUTPUT: ${{ inputs.output-image }}
        MAX_LAYERS: ${{ inputs.max-layers }}
      run: |
        set -euo pipefail

        # Version pin — bump both CHUNKAH_SHA and CHUNKAH_VERSION together.
        # Containerfile.splitter is fetched from the matching release tag at build time.
        # Version pin — bump CHUNKAH_VERSION, CHUNKAH_SHA, and bootc-build/chunka/Containerfile.splitter
        # together in the same commit. The vendored Containerfile.splitter was fetched from the release
        # at CHUNKAH_VERSION and verified: sha256:66d758ca7f6d3280d80c506e53d632391fb4150f1bc202fec876507d1d9b2ba7
        # Do NOT fetch Containerfile.splitter from the network at build time — see docs/skills/supply-chain.md.
        CHUNKAH_VERSION="v0.5.0"
        CHUNKAH_SHA="sha256:352097f3d32186ac11082f8b74cd544678b00388b50c96ba5c8e79503a454fe3"
        CHUNKAH_REF="quay.io/coreos/chunkah:${CHUNKAH_VERSION}@${CHUNKAH_SHA}"
        CONTAINERFILE="${{ github.action_path }}/Containerfile.splitter"

        OUTPUT_TAG="${OUTPUT:-${SOURCE}}"

        # CHUNKAH_CONFIG_STR passes existing OCI labels (containers.bootc=1, etc.)
        # into chunkah so they are preserved on the rechunked image.
        CHUNKAH_CONFIG_STR="$(sudo podman inspect "${SOURCE}")"

        # -v and --security-opt are required for buildah < v1.44 (Ubuntu 24.04 ships 1.33.x).
        # The bind-mount of /run/src keeps out.ociarchive in the host CWD so that the final
        # `FROM oci-archive:out.ociarchive` stage in Containerfile.splitter can find it.
        sudo buildah build \
          --skip-unused-stages=false \
          --from "${SOURCE}" \
          --build-arg "CHUNKAH=${CHUNKAH_REF}" \
          --build-arg "CHUNKAH_CONFIG_STR=${CHUNKAH_CONFIG_STR}" \
          --build-arg "CHUNKAH_ARGS=--max-layers ${MAX_LAYERS} --prune /sysroot/ --label ostree.commit- --label ostree.final-diffid-" \
          -t "${OUTPUT_TAG}" \
          -v "$(pwd):/run/src" \
          --security-opt=label=disable \
          "${CONTAINERFILE}"

        sudo rm -f out.ociarchive

        # Transfer rechunked image from root (buildah) storage to user (podman) storage.
        # buildah runs as root, so its container store is separate from the runner-user's
        # podman store. Piping save→load makes the tagged image visible to unprivileged
        # podman steps that follow.
        sudo podman save "${OUTPUT_TAG}" | podman load

        echo "image-ref=${OUTPUT_TAG}" >> "$GITHUB_OUTPUT"
