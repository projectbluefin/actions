name: "bootc-build/generate-tags"
description: "Generate OCI image tags based on stream, version, and event context"
author: "projectbluefin"

inputs:
  base-name:
    description: "Base image name (e.g. bluefin, aurora)"
    required: true
  stream-name:
    description: "Stream/tag name (e.g. latest, stable, testing, beta)"
    required: true
  image-flavor:
    description: "Image flavor (e.g. main, nvidia, hwe)"
    default: "main"
  kernel-pin:
    description: "Optional kernel pin string (e.g. 6.14.9-200.fc42.x86_64). Overrides Fedora version extraction."
    default: ""
  version-label:
    description: |
      Value of the OCI org.opencontainers.image.version label from the built image
      (e.g. 42.20250531). Extract via:
        podman inspect <image> | jq -r '.[].Config.Labels["org.opencontainers.image.version"]'
    required: true
  event-name:
    description: "GitHub event name (github.event_name)"
    required: true
  pr-number:
    description: "Pull request number (github.event.number). Required when event-name is pull_request."
    default: ""

outputs:
  tags:
    description: "Space-separated list of OCI tags to apply to the image"
    value: ${{ steps.generate.outputs.tags }}
  default-tag:
    description: "Primary/default tag used for signing and digest capture"
    value: ${{ steps.generate.outputs.default_tag }}

runs:
  using: "composite"
  steps:
    - name: Generate tags
      id: generate
      shell: bash
      env:
        BASE_NAME: ${{ inputs.base-name }}
        STREAM: ${{ inputs.stream-name }}
        FLAVOR: ${{ inputs.image-flavor }}
        KERNEL_PIN: ${{ inputs.kernel-pin }}
        VERSION_LABEL: ${{ inputs.version-label }}
        EVENT_NAME: ${{ inputs.event-name }}
        PR_NUMBER: ${{ inputs.pr-number }}
      run: bash "${{ github.action_path }}/generate_tags.sh"
        set -euo pipefail
