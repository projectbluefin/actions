name: "bootc-build/scan-image"
description: "Scan a built OCI image for CVEs and secrets with Trivy. Scans OS packages, libraries, and OCI image config ENV layers for baked-in secrets. Run per-arch before push."
author: "projectbluefin"

inputs:
  image:
    description: "Full image reference or local image name to scan (e.g. localhost/bluefin:latest). Use 'input' for archive files."
    required: false
    default: ""
  input:
    description: "Path to an OCI archive or Docker archive file to scan (e.g. /tmp/scan-image.tar). Use instead of 'image' for archive files."
    required: false
    default: ""
  severity-threshold:
    description: "Report vulnerabilities at this severity and above (CRITICAL, HIGH, MEDIUM, LOW)."
    default: "CRITICAL"
  exit-code:
    description: "Deprecated compatibility input. scan-image always exits 0 and never blocks builds."
    default: "0"
  ignore-unfixed:
    description: "Ignore vulnerabilities that have no available fix"
    default: "true"
  create-issue:
    description: "When true, create a GitHub issue if CRITICAL CVEs are detected."
    default: "false"
  github-token:
    description: "Token for uploading SARIF results to GitHub Security tab and as the fallback token for issue creation"
    required: true
  gh-token:
    description: "Optional token override for gh issue creation. Defaults to github-token when empty."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Compute Trivy DB cache key (daily rotation)
      id: trivy-date
      shell: bash
      run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

    - name: Restore Trivy vulnerability DB cache
      id: trivy-db-cache-restore
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/trivy
        key: trivy-db-${{ runner.os }}-${{ runner.arch }}-${{ steps.trivy-date.outputs.date }}
        restore-keys: |
          trivy-db-${{ runner.os }}-${{ runner.arch }}-

    - name: Scan image with Trivy (SARIF)
      # continue-on-error: Trivy DB errors (e.g. missing CPE indices for a new OS family like
      # CentOS 10) cause Trivy to exit 1 even when exit-code is '0'. This must not block builds.
      # See https://github.com/aquasecurity/trivy-db/issues/435
      continue-on-error: true
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: 'image'
        image-ref: ${{ inputs.image }}
        input: ${{ inputs.input }}
        format: sarif
        output: trivy-results.sarif
        severity: ${{ inputs.severity-threshold }}
        exit-code: '0'
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        vuln-type: os,library
        # Scan filesystem layers for exposed secrets (API keys, tokens, credentials)
        scanners: vuln,secret
        # Scan OCI image config for secrets baked into ENV instructions
        image-config-scanners: secret

    - name: Scan image with Trivy (JSON)
      # continue-on-error: same rationale as the SARIF step above.
      continue-on-error: true
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: 'image'
        image-ref: ${{ inputs.image }}
        input: ${{ inputs.input }}
        format: json
        output: trivy-results.json
        severity: ${{ inputs.severity-threshold }}
        exit-code: '0'
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        vuln-type: os,library
        scanners: vuln,secret
        image-config-scanners: secret

    - name: Save Trivy vulnerability DB cache
      # Only save on cache miss — DB is shared between the SARIF and JSON scan steps above.
      if: steps.trivy-db-cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/trivy
        key: ${{ steps.trivy-db-cache-restore.outputs.cache-primary-key }}

    - name: Summarize CVE findings
      id: summarize-cves
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image }}
        INPUT_PATH: ${{ inputs.input }}
        SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
        FINDINGS_FILE: ${{ github.workspace }}/scan-image-critical-findings.json
        REPOSITORY: ${{ github.repository }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        python3 <<'PY'
        import json
        import os
        from collections import defaultdict
        from datetime import datetime, UTC
        from pathlib import Path

        severity_order = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "UNKNOWN"]

        def normalize_severity(value):
            text = str(value or "").strip().upper()
            if text in severity_order:
                return text
            try:
                score = float(text)
            except ValueError:
                return "UNKNOWN"
            if score >= 9.0:
                return "CRITICAL"
            if score >= 7.0:
                return "HIGH"
            if score >= 4.0:
                return "MEDIUM"
            if score > 0:
                return "LOW"
            return "UNKNOWN"

        findings_path = Path(os.environ["FINDINGS_FILE"])
        display_ref = os.environ.get("IMAGE_REF") or os.environ.get("INPUT_PATH") or "unknown-image"
        repo = os.environ.get("REPOSITORY", "")
        run_url = os.environ.get("RUN_URL", "")
        threshold = os.environ.get("SEVERITY_THRESHOLD", "CRITICAL")
        ref_name = os.environ.get("REF_NAME", "") or "unknown-ref"
        scan_date = datetime.now(UTC).strftime("%Y-%m-%dT%H:%M:%SZ")

        counts = defaultdict(int)
        trivy_results_path = Path("trivy-results.json")
        if not trivy_results_path.exists():
            # Trivy crashed before producing output (e.g. DB missing CPE indices for this OS).
            # Emit a warning and write an empty findings file so downstream steps don't fail.
            # See https://github.com/aquasecurity/trivy-db/issues/435
            print("::warning::trivy-results.json not found — Trivy scan likely failed (e.g. DB missing CPE indices for this OS). Skipping CVE summary.")
            trivy = {"Results": []}
        else:
            trivy = json.loads(trivy_results_path.read_text(encoding="utf-8"))
        seen = set()
        critical_entries = []
        for result in trivy.get("Results", []) or []:
            target = result.get("Target", "")
            for vuln in result.get("Vulnerabilities", []) or []:
                cve_id = vuln.get("VulnerabilityID", "")
                if not cve_id.startswith("CVE-"):
                    continue
                severity = normalize_severity(vuln.get("Severity"))
                counts[severity] += 1
                entry = {
                    "package": vuln.get("PkgName", ""),
                    "cve": cve_id,
                    "severity": severity,
                    "installed": vuln.get("InstalledVersion", ""),
                    "fixed": vuln.get("FixedVersion", ""),
                    "target": target,
                }
                if severity != "CRITICAL":
                    continue
                key = (entry["package"], entry["cve"], entry["installed"], entry["fixed"])
                if key in seen:
                    continue
                seen.add(key)
                critical_entries.append(entry)

        total_cves = sum(counts.values())
        highest_severity = next((name for name in severity_order if counts.get(name, 0) > 0), threshold)
        issue_title = f"fix(security): critical CVE detected in {ref_name} build"
        critical_entries.sort(key=lambda entry: (entry["cve"], entry["package"], entry["installed"]))
        findings_path.write_text(
            json.dumps(
                {
                    "image": display_ref,
                    "repository": repo,
                    "run_url": run_url,
                    "scan_date": scan_date,
                    "severity_threshold": threshold,
                    "highest_severity": highest_severity,
                    "total_cves": total_cves,
                    "ref_name": ref_name,
                    "critical_entries": critical_entries,
                },
                indent=2,
            )
            + "\n",
            encoding="utf-8",
        )

        with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
            output.write(f"cves-found={'true' if total_cves else 'false'}\n")
            output.write(f"critical-cves-found={'true' if critical_entries else 'false'}\n")
            output.write(f"issue-title={issue_title}\n")
            output.write(f"findings-file={findings_path}\n")

        if total_cves:
            print(f"::warning::{total_cves} CVE(s) detected in {display_ref}")
        else:
            print(f"No CVEs detected in {display_ref}")
        PY

    - name: Upload SARIF to GitHub Security tab
      if: always() && hashFiles('trivy-results.sarif') != ''
      uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
      with:
        sarif_file: trivy-results.sarif
        token: ${{ inputs.github-token }}

    - name: Create CVE issue
      if: ${{ always() && steps.summarize-cves.outputs.critical-cves-found == 'true' && inputs.create-issue == 'true' }}
      shell: bash
      env:
        GH_TOKEN_INPUT: ${{ inputs.gh-token }}
        GITHUB_TOKEN_INPUT: ${{ inputs.github-token }}
        ISSUE_TITLE: ${{ steps.summarize-cves.outputs.issue-title }}
        FINDINGS_FILE: ${{ steps.summarize-cves.outputs.findings-file }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        if [[ -n "${GH_TOKEN_INPUT}" ]]; then
          export GH_TOKEN="${GH_TOKEN_INPUT}"
        else
          export GH_TOKEN="${GITHUB_TOKEN_INPUT}"
        fi

        python3 <<'PY'
        import json
        import os
        import subprocess
        import sys
        from pathlib import Path

        repo = os.environ["REPO"]
        title = os.environ["ISSUE_TITLE"]
        findings = json.loads(Path(os.environ["FINDINGS_FILE"]).read_text(encoding="utf-8"))
        body_path = Path(os.environ["GITHUB_WORKSPACE"]) / "scan-image-issue-body.md"
        desired_labels = ["priority/p0", "area/security", "kind/bug"]

        def gh_json(*args):
            completed = subprocess.run(
                ["gh", *args],
                check=True,
                capture_output=True,
                text=True,
            )
            stdout = completed.stdout.strip()
            return json.loads(stdout) if stdout else []

        try:
            existing_labels = {
                item["name"]
                for item in gh_json("label", "list", "--repo", repo, "--limit", "200", "--json", "name")
            }
            labels = [label for label in desired_labels if label in existing_labels]

            novel_entries = []
            duplicate_cves = []
            seen_duplicate_cves = set()
            for entry in findings.get("critical_entries", []):
                cve = entry["cve"]
                matches = gh_json(
                    "issue",
                    "list",
                    "--repo",
                    repo,
                    "--state",
                    "open",
                    "--search",
                    f"{cve} state:open",
                    "--limit",
                    "1",
                    "--json",
                    "number",
                )
                if matches:
                    if cve not in seen_duplicate_cves:
                        duplicate_cves.append(cve)
                        seen_duplicate_cves.add(cve)
                    continue
                novel_entries.append(entry)

            if not novel_entries:
                print("::notice::Critical CVEs already have open issues; skipping auto-file")
                sys.exit(0)

            lines = [
                "## Critical CVEs detected by Trivy",
                "",
                f"- Image: `{findings['image']}`",
                f"- Repository: `{findings['repository']}`",
                f"- Ref: `{findings['ref_name']}`",
                f"- Scan date (UTC): `{findings['scan_date']}`",
                f"- Workflow run: {findings['run_url']}",
                "",
                "| CVE | Package | Installed version | Fixed version |",
                "| --- | --- | --- | --- |",
            ]

            for entry in novel_entries:
                fixed = entry["fixed"] or "none available"
                lines.append(
                    f"| {entry['cve']} | {entry['package'] or 'unknown'} | "
                    f"`{entry['installed'] or 'unknown'}` | `{fixed}` |"
                )

            if duplicate_cves:
                lines.extend(
                    [
                        "",
                        "Skipped because an open issue already exists for:",
                        "",
                        ", ".join(f"`{cve}`" for cve in duplicate_cves),
                    ]
                )

            lines.extend(["", "_Opened automatically by `bootc-build/scan-image`._"])
            body_path.write_text("\n".join(lines) + "\n", encoding="utf-8")

            cmd = ["gh", "issue", "create", "--repo", repo, "--title", title, "--body-file", str(body_path)]
            for label in labels:
                cmd.extend(["--label", label])
            subprocess.run(cmd, check=True)
        except subprocess.CalledProcessError as exc:
            print(f"::warning::Failed to create CVE issue for {repo}: {exc}", file=sys.stderr)
        PY
