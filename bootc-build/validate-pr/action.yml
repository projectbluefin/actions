name: "bootc-build/validate-pr"
description: "Validate a bootc PR: just check, shellcheck, hadolint, pre-commit — all action pins live here so Renovate updates this one file, not every consumer workflow"
author: "projectbluefin"

inputs:
  dockerfile:
    description: "Path to the Containerfile/Dockerfile to lint with hadolint"
    default: "Containerfile"
  hadolint-config:
    description: "Path to the hadolint configuration file"
    default: ".hadolint.yaml"
  shellcheck-glob:
    description: "Glob for shell scripts to check (expanded with globstar in workspace root)"
    default: "build_files/**/*.sh"

runs:
  using: "composite"
  steps:
    - name: Install just
      uses: taiki-e/install-action@427262525d42141333caf43b602cf574dd6a6381 # just
      with:
        tool: just

    - name: Install shellcheck
      shell: bash
      run: sudo apt-get update -y && sudo apt-get install -y shellcheck

    - name: Install pre-commit
      shell: bash
      run: pip install pre-commit

    - name: Cache pre-commit hooks
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/pre-commit
        key: ${{ runner.os }}-${{ runner.arch }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-pre-commit-

    - name: Check Just syntax
      shell: bash
      run: just check

    - name: Shellcheck build scripts
      shell: bash
      env:
        SHELLCHECK_GLOB: ${{ inputs.shellcheck-glob }}
      run: |
        shopt -s globstar nullglob
        # shellcheck disable=SC2086
        shellcheck ${SHELLCHECK_GLOB}

    - name: Lint Containerfile
      uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
      with:
        dockerfile: ${{ inputs.dockerfile }}
        config: ${{ inputs.hadolint-config }}

    - name: Run pre-commit
      shell: bash
      run: pre-commit run --all-files
