name: "bootc-build/push-image"
description: "Push container image to GHCR with retry and skopeo copy for additional tags"
author: "projectbluefin"

inputs:
  image-name:
    description: "Local image name (without registry)"
    required: true
  tags:
    description: "Space-separated list of tags to push"
    required: true
  default-tag:
    description: "Primary tag for initial push and digest capture (first tag if empty)"
    default: ""
  registry:
    description: "Target container registry"
    default: "ghcr.io"
  max-attempts:
    description: "Maximum retry attempts for the initial push"
    default: "3"
  retry-wait-seconds:
    description: "Seconds to wait between retries"
    default: "15"
  compression-format:
    description: "Podman push compression format (e.g. 'zstd:chunked', 'zstd', 'gzip')"
    default: "zstd:chunked"
  force-compression:
    description: "Force recompression during podman push"
    default: "false"
  fix-auth-permissions:
    description: "Fix auth file ownership before user-space registry login"
    default: "true"
  github-token:
    description: "Token for registry login"
    required: true

outputs:
  digest:
    description: "Digest of the pushed image (sha256:...)"
    value: ${{ steps.push.outputs.digest }}
  registry-path:
    description: "Full lowercased registry path (e.g. ghcr.io/projectbluefin)"
    value: ${{ steps.push.outputs.registry-path }}

runs:
  using: "composite"
  steps:
    - name: Fix container auth permissions
      if: inputs.fix-auth-permissions == 'true'
      shell: bash
      run: |
        set -euo pipefail
        AUTH_DIR="/run/user/$(id -u)/containers"
        if [[ -d "${AUTH_DIR}" ]]; then
          sudo chown -R "$(id -u):$(id -g)" "${AUTH_DIR}"
        fi

    - name: Login to registry
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REGISTRY: ${{ inputs.registry }}
        GITHUB_ACTOR: ${{ github.actor }}
      run: |
        set -euo pipefail
        echo "${GITHUB_TOKEN}" | podman login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin
        echo "${GITHUB_TOKEN}" | docker login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin 2>/dev/null || true

    - name: Push image with retry and skopeo copy for aliases
      id: push
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        TAGS: ${{ inputs.tags }}
        DEFAULT_TAG_INPUT: ${{ inputs.default-tag }}
        REGISTRY: ${{ inputs.registry }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        MAX_ATTEMPTS: ${{ inputs.max-attempts }}
        RETRY_WAIT: ${{ inputs.retry-wait-seconds }}
        COMPRESSION_FORMAT: ${{ inputs.compression-format }}
        FORCE_COMPRESSION: ${{ inputs.force-compression }}
        DIGEST_FILE: ${{ runner.temp }}/push-digest
      run: |
        set -euo pipefail

        REGISTRY_LOWER="${REGISTRY,,}/${GITHUB_REPOSITORY_OWNER,,}"
        echo "registry-path=${REGISTRY_LOWER}" >> "$GITHUB_OUTPUT"

        # Determine default tag (first tag if not specified)
        read -r -a TAG_ARRAY <<< "${TAGS}"
        if [[ ${#TAG_ARRAY[@]} -eq 0 ]]; then
          echo "::error::At least one tag must be provided"
          exit 1
        fi
        DEFAULT_TAG="${DEFAULT_TAG_INPUT:-${TAG_ARRAY[0]}}"

        FC_FLAG=""
        if [[ "${FORCE_COMPRESSION}" == "true" ]]; then
          FC_FLAG="--force-compression"
        fi

        attempt=0
        while true; do
          attempt=$((attempt + 1))
          rm -f "${DIGEST_FILE}"

          buildah push \
            --compression-format "${COMPRESSION_FORMAT}" \
            --compression-level 3 \
            ${FC_FLAG:+${FC_FLAG}} \
            --retry 5 --retry-delay 30s \   # --retry-delay requires buildah >= 1.28 (ubuntu-24.04 ships 1.35+)
            "${IMAGE_NAME}:${DEFAULT_TAG}" \
            "${REGISTRY_LOWER}/${IMAGE_NAME}:${DEFAULT_TAG}"

          skopeo inspect --no-tags \
            "docker://${REGISTRY_LOWER}/${IMAGE_NAME}:${DEFAULT_TAG}" \
            | jq -r '.Digest' > "${DIGEST_FILE}"

          if [[ -s "${DIGEST_FILE}" ]] && [[ $(<"${DIGEST_FILE}") != "null" ]]; then
            break
          fi

          if [[ ${attempt} -ge ${MAX_ATTEMPTS} ]]; then
            echo "::error::Push failed after ${MAX_ATTEMPTS} attempts"
            exit 1
          fi
          echo "Push attempt ${attempt} failed, retrying in ${RETRY_WAIT}s..."
          sleep "${RETRY_WAIT}"
        done

        DIGEST=$(<"${DIGEST_FILE}")
        echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

        # Server-side copy for all alias tags (no re-upload)
        for tag in "${TAG_ARRAY[@]}"; do
          if [[ "${tag}" != "${DEFAULT_TAG}" ]]; then
            skopeo copy \
              "docker://${REGISTRY_LOWER}/${IMAGE_NAME}:${DEFAULT_TAG}" \
              "docker://${REGISTRY_LOWER}/${IMAGE_NAME}:${tag}"
          fi
        done
