name: "bootc-build/detect-changes"
description: "Detect whether image-affecting paths changed; computes image_flavors for the build matrix."
author: "projectbluefin"

inputs:
  filters:
    description: "Full dorny/paths-filter YAML. Must define 'image' and 'nvidia' filters. Override for repos that use different path conventions (e.g. build_scripts instead of build_files)."
    default: |
      image:
        - 'Containerfile'
        - 'build_files/**'
        - 'system_files/**'
        - 'image-versions.yml'
        - 'Justfile'
      nvidia:
        - 'build_files/base/04-install-kernel-akmods.sh'
        - 'Containerfile'

outputs:
  image_changed:
    description: "'true' if any image-affecting path changed"
    value: ${{ steps.filter.outputs.image }}
  nvidia_changed:
    description: "'true' if a path that requires the nvidia flavor changed"
    value: ${{ steps.filter.outputs.nvidia }}
  should_build:
    description: "Alias for image_changed — 'true' when a build is needed"
    value: ${{ steps.filter.outputs.image }}
  image_flavors:
    description: "JSON array of image flavors to build: '[\"main\"]' or '[\"main\",\"nvidia\"]'"
    value: ${{ steps.matrix.outputs.image_flavors }}

runs:
  using: "composite"
  steps:
    - name: Filter changed paths
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
      id: filter
      with:
        filters: ${{ inputs.filters }}

    - name: Compute image_flavors
      id: matrix
      shell: bash
      env:
        NVIDIA_CHANGED: ${{ steps.filter.outputs.nvidia }}
      run: |
        set -euo pipefail
        if [[ "${NVIDIA_CHANGED}" == "true" ]]; then
          echo 'image_flavors=["main","nvidia"]' >> "$GITHUB_OUTPUT"
        else
          echo 'image_flavors=["main"]' >> "$GITHUB_OUTPUT"
        fi
