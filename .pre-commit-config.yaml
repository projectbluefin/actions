repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 2c9f875913ee60ca25ce70243dc24d5b6415598c  # v4.6.0
    hooks:
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
  - repo: https://github.com/rhysd/actionlint
    rev: 03d0035246f3e81f36aed592ffb4bebf33a03106  # v1.7.7
    hooks:
      - id: actionlint
        args:
          # 'workflows' is a valid GITHUB_TOKEN scope (Feb 2023). actionlint's
          # built-in list predates this. Suppress until actionlint is updated.
          - -ignore
          - 'unknown permission scope "workflows"'
  - repo: local
    hooks:
      - id: no-floating-action-tags
        name: Block floating GitHub Action tags (@main, @v*)
        language: pygrep
        entry: 'uses:(?!.*projectbluefin/).*@(main|master|latest|v[0-9])'
        types: [yaml]
        files: '(^\.github/workflows/.*\.yml$|action\.yml$)'
      - id: check-consumer-contract
        name: Verify consumer contract inputs are intact
        language: python
        entry: python3 scripts/check-consumer-contract.py
        pass_filenames: false
        files: '(^bootc-build/.*/action\.yml$|^\.github/workflows/reusable-.*\.yml$|^docs/consumer-contract\.yml$)'
        additional_dependencies: [pyyaml]
